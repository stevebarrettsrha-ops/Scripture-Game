<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The First Book of A'dam and Chavvah</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      font-family: Georgia, 'Times New Roman', serif;
      color: #f5e6c8;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }
    #root { width: 100%; height: 100vh; }

    /* ── Game container ─────────────────────────────────────── */
    .game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Top bar ────────────────────────────────────────────── */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid #d4a01740;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 50;
    }
    .top-bar .back-btn {
      background: none; border: none;
      color: #d4a017; font-size: 0.9rem;
      cursor: pointer; font-family: Georgia, serif;
    }
    .top-bar .back-btn:hover { color: #ffd700; }
    .top-bar .title-text {
      color: #e8d8a8; font-size: 0.8rem;
      letter-spacing: 1px;
    }
    .top-bar .read-btn {
      background: none; border: none;
      color: #d4a017; font-size: 0.8rem;
      cursor: pointer; font-family: Georgia, serif;
    }

    /* ── Cutscene overlay ───────────────────────────────────── */
    .cutscene-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      z-index: 20; pointer-events: none;
    }
    .cutscene-header {
      position: absolute;
      top: 50px; left: 0; right: 0;
      text-align: center; padding: 12px;
      pointer-events: none;
    }
    .cutscene-day {
      color: #d4a017; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 3px;
      font-family: Georgia, serif;
      text-shadow: 0 1px 6px #000;
    }
    .cutscene-counter {
      position: absolute; top: 54px; right: 14px;
      color: #6b7280; font-size: 0.7rem; z-index: 21;
    }
    .cutscene-box {
      margin: 0 auto 12px;
      width: calc(100% - 24px); max-width: 680px;
      max-height: 40vh; overflow-y: auto;
      background: rgba(0,0,0,0.88);
      border: 2px solid #d4a017; border-radius: 10px;
      padding: 14px 16px 10px; pointer-events: auto;
    }
    .cutscene-ref {
      color: #8b7340; font-size: 0.7rem;
      margin-bottom: 10px; font-family: Georgia, serif;
      letter-spacing: 1px;
    }
    .cutscene-verse {
      color: #f5e6c8; font-size: 0.88rem;
      line-height: 1.55; font-family: Georgia, serif;
      margin-bottom: 8px;
    }
    .cutscene-verse:last-of-type { margin-bottom: 14px; }
    .cutscene-btn {
      width: 100%;
      background: linear-gradient(180deg, #b8860b, #8b6914);
      color: #fff; font-weight: bold;
      padding: 10px 16px; border-radius: 5px;
      border: 1px solid #d4a017; cursor: pointer;
      font-size: 0.9rem; letter-spacing: 1px;
      transition: background 0.2s;
    }
    .cutscene-btn:hover { background: linear-gradient(180deg, #d4a017, #b8860b); }

    /* ── Menu overlay ───────────────────────────────────────── */
    .menu-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 30;
    }
    .menu-title {
      font-family: Georgia, serif; font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 2px 12px rgba(255,215,0,0.4);
      margin-bottom: 6px; text-align: center; letter-spacing: 2px;
    }
    .menu-subtitle {
      font-family: Georgia, serif; font-size: 0.9rem;
      color: #8b7340; margin-bottom: 40px; font-style: italic;
    }
    .menu-btn {
      width: 260px; padding: 14px 20px; margin-bottom: 14px;
      background: linear-gradient(180deg, #b8860b, #8b6914);
      color: #fff; font-weight: bold; font-size: 1rem;
      border-radius: 6px; border: 2px solid #d4a017;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    .menu-btn:hover { background: linear-gradient(180deg, #d4a017, #b8860b); transform: scale(1.03); }
    .menu-btn:active { background: #8b6914; transform: scale(0.98); }
    .menu-btn.secondary {
      background: rgba(30,30,30,0.8); border-color: #4b5563;
    }
    .menu-btn.secondary:hover { background: rgba(50,50,50,0.9); }

    /* ── Dialogue box ───────────────────────────────────────── */
    .dialogue-box {
      position: absolute;
      bottom: 90px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 24px); max-width: 640px;
      background: rgba(0,0,0,0.92);
      border: 2px solid #eab308; border-radius: 8px;
      padding: 12px; z-index: 20;
    }
    .dialogue-box.scene-dialogue { bottom: auto; top: 50px; }
    .dialogue-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .dialogue-name { color: #facc15; font-weight: bold; }
    .dialogue-counter { color: #6b7280; font-size: 0.75rem; }
    .dialogue-text { color: white; font-size: 0.9rem; margin-bottom: 12px; line-height: 1.5; }
    .scene-text {
      color: #fde047; font-size: 0.9rem; font-style: italic;
      margin-bottom: 12px; font-family: Georgia, serif;
    }
    .btn {
      width: 100%; background: #ca8a04; color: white;
      font-weight: bold; padding: 8px 16px;
      border-radius: 4px; border: none; cursor: pointer;
    }
    .btn:hover { background: #eab308; }

    /* ── Controls ────────────────────────────────────────────── */
    .controls {
      position: absolute;
      bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 32px; align-items: center; z-index: 20;
    }
    .dpad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    }
    .dpad-btn {
      width: 56px; height: 56px;
      background: rgba(31,41,55,0.85);
      border: 2px solid #4b5563; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #d1d5db; cursor: pointer;
    }
    .dpad-btn:active { background: #374151; border-color: #eab308; }
    .talk-btn {
      width: 72px; height: 72px;
      background: #ca8a04; border: 4px solid #facc15;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 0.85rem; cursor: pointer;
    }
    .talk-btn:active { background: #eab308; }

    /* ── Pause icon ──────────────────────────────────────────── */
    .menu-icon-btn {
      position: absolute; top: 52px; right: 8px;
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.7); border: 2px solid #d4a017;
      border-radius: 6px; color: #facc15; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; z-index: 25;
    }

    /* ── Quest text ──────────────────────────────────────────── */
    .quest-text {
      position: absolute; top: 50px; left: 50%;
      transform: translateX(-50%);
      color: #fde047; font-size: 0.8rem;
      text-shadow: 0 1px 3px #000;
      pointer-events: none; white-space: nowrap; z-index: 10;
    }

    /* ── Parchment read mode ─────────────────────────────────── */
    .parchment-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        #e8dcc8 0%, #f0e6d2 8%, #f5edd9 20%,
        #efe5cf 50%, #e8dcbf 80%, #dfd3b5 100%);
      overflow-y: auto; z-index: 40;
      padding: 60px 18px 40px;
    }
    .parchment-overlay .section-banner {
      position: relative; width: calc(100% + 36px);
      margin: -60px -18px 0; height: 140px;
      overflow: hidden; display: flex;
      align-items: center; justify-content: center;
    }
    .parchment-overlay .banner-bg {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        #2a3a2a 0%, #3d4a2d 30%, #4a5a35 50%, #3d4a2d 70%, #2a3a2a 100%);
      opacity: 0.95;
    }
    .parchment-overlay .banner-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.35);
    }
    .parchment-overlay .banner-title {
      position: relative; z-index: 2;
      color: #e8d8a8; font-size: 1.6rem;
      font-style: italic;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      letter-spacing: 2px;
    }
    .parchment-overlay .banner-subtitle {
      position: relative; z-index: 2;
      color: #c8b88a; font-size: 0.75rem;
      font-style: italic;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      text-align: center; max-width: 80%; line-height: 1.4;
      margin-top: 6px;
    }
    .parchment-overlay .banner-content {
      display: flex; flex-direction: column;
      align-items: center; z-index: 2;
    }
    .parchment-overlay .icon-bar {
      display: flex; justify-content: flex-end;
      gap: 12px; padding: 10px 0;
      border-bottom: 1px solid rgba(180,160,120,0.3);
    }
    .parchment-overlay .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .parchment-overlay .icon-btn.check { background: #4a7a4a; color: white; }
    .parchment-overlay .icon-btn.share { background: rgba(60,50,30,0.15); color: #5a4a30; }
    .parchment-overlay .icon-btn.settings { background: rgba(60,50,30,0.15); color: #5a4a30; }
    .parchment-overlay .content-body {
      max-width: 680px; margin: 0 auto;
      padding: 20px 0 40px;
      line-height: 1.7; font-size: 0.95rem; color: #3b2f1e;
    }
    .parchment-overlay .content-body p { margin-bottom: 16px; }
    .parchment-overlay .verse-num {
      color: #8b7340; font-size: 0.85rem;
      font-weight: bold; margin-right: 4px;
    }
    .parchment-overlay .nav-bar {
      display: flex; justify-content: center; gap: 12px;
      padding: 24px 0 40px; max-width: 680px; margin: 0 auto;
    }
    .parchment-overlay .nav-btn {
      flex: 1; max-width: 220px;
      padding: 14px 20px;
      background: linear-gradient(180deg, #b8860b, #8b6914);
      color: #fff; font-weight: bold; font-size: 0.9rem;
      border-radius: 6px; border: 2px solid #d4a017;
      cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif;
    }
    .parchment-overlay .nav-btn:hover { background: linear-gradient(180deg, #d4a017, #b8860b); }
    .parchment-overlay .nav-btn.secondary {
      background: rgba(60,50,30,0.15); color: #5a4a30; border-color: #b8a88a;
    }

    /* ── Scrollbar styling ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #b8a88a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // ═══════════════════════════════════════════════════════════════
    // THE FIRST BOOK OF A'DAM AND CHAVVAH — Interactive Scripture
    // ═══════════════════════════════════════════════════════════════

    const TILE = 64;
    const SCALE = 2;

    // ── Seeded RNG ──────────────────────────────────────────────
    const seededRng = (seed) => {
      let s = seed | 0;
      return () => { s = (s + 0x6D2B79F5) | 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
    };

    // ── Chapter Data ────────────────────────────────────────────
    const CHAPTERS = [

            '4 And God created that sea of his own good pleasure, for He knew what would come of the man He would make; so that after he had left the garden, on account of his transgression, men should be born in the earth.',

            '5 But when God made A\u2019dam go out of the garden, He did not place him on the border of it northward. This was so that he and Chavvah would not be able to go near to the sea of water where they could wash themselves in it, be cleansed from their sins.',
            '6 As to the southern side of the garden, God did not want A\u2019dam to live there either; because, when the wind blew from the north, it would bring him, on that southern side, the delicious smell of the trees of the garden.',
            '7 Wherefore God did not put A\u2019dam there. This was so that he would not be able to smell the sweet smell of those trees, forget his transgression.',

          { ref: 'First Book of A\'dam & Chavvah 1:8-9', lines: [

        levelType: 'wasteland_to_cave',

        npcs: [

            dialogue: [

          { id: 'chavvah', name: "Chavvah", x: 14, y: 15, color: SKIN_COLOR, hairColor: '#3d1f00', isEve: true,

        verses: [

          '6 As to the southern side of the garden, God did not want A\u2019dam to live there either; because, when the wind blew from the north, it would bring him, on that southern side, the delicious smell of the trees of the garden.',
          '7 Wherefore God did not put A\u2019dam there. This was so that he would not be able to smell the sweet smell of those trees, forget his transgression, and find consolation for what he had done by taking delight in the smell of the trees and yet not be cleansed from his transgression.',

          '9 And God commanded him to live there in a cave in a rock\u2014the Cave of Treasures below the garden.',

      {

          '6 "What is this overhanging ledge of rock to shelter us, compared with the mercy of YAHUAH that overshadowed us?',

          '10 A\u2019dam said again to Chavvah, "What is our body today, compared to what it was in former days, when we lived in the garden?"',

      {

        subtitle: 'A\'dam and Chavvah grieve. The darkness of the cave. A\'dam\'s first prayer.',
        cutsceneSlides: [

    // Prologue text
    const PROLOGUE_TEXT = [
      'The First Book of A\u2019dam and Chavvah details the life and times of A\u2019dam and Chavvah after they were expelled from the garden to the time that Qayin kills his brother Havel. It tells of A\u2019dam and Chavvah\u2019s first dwelling\u2014the Cave of Treasures; their trials and temptations; Satan\u2019s many apparitions to them; the birth of Qayin, Havel, and their twin sisters; and Qayin\u2019s love for his beautiful twin sister, Luluwa, whom A\u2019dam and Chavvah wished to join to Havel.',
      'This book is considered by many scholars to be part of the "Pseudepigrapha" (soo-duh-pig-ruh-fuh). The "Pseudepigrapha" is a collection of historical biblical works that are considered to be fiction. Because of that stigma, this book was not included in the compilation of the Holy Bible. This book is a written history of what happened in the days of A\u2019dam and Chavvah after they were cast out of the garden. Although considered to be pseudepigraphic by some, it carries significant meaning and insight into events of that time. It is doubtful that these writings could have survived all the many centuries if there were no substance to them.',

    // ── GAME STATE ──────────────────────────────────────────────
    // Phases: TITLE, PROLOGUE, CUTSCENE, LEVEL, READ, CHAPTER_COMPLETE
    let phase = 'TITLE';

    // ── TILE TYPES ──────────────────────────────────────────────
    const T = {
      WASTELAND: 0, ROCK: 1, TREE: 2, CAVE: 3,
      GRASS: 4, PATH: 5, WATER: 6, BUSH: 7,
      CAVE_FLOOR: 8, CAVE_WALL: 9, CAVE_ENTRANCE: 10,

    const SOLID = new Set([T.ROCK, T.TREE, T.CAVE_WALL, T.WATER]);

    // ── MAP GENERATORS ──────────────────────────────────────────
    function generateWastelandMap() {
      const rng = seededRng(77777);
      const w = 40, h = 30;
      const map = [];
      for (let y = 0; y < h; y++) {
        const row = [];
        for (let x = 0; x < w; x++) {
          // Border trees
          if (x < 2 || x > w-3 || y < 2 || y > h-3) { row.push(T.TREE); continue; }
          // Garden on the east (green wall)
          if (x > w-6) { row.push(T.TREE); continue; }
          // Water / sea to the north
          if (y < 5 && x > 5 && x < w-8) { row.push(T.WATER); continue; }
          // Path leading west toward cave
          if (y >= 14 && y <= 16 && x >= 4 && x <= w-7) { row.push(T.PATH); continue; }
          // Cave of Treasures (west side)
          if (x >= 4 && x <= 7 && y >= 10 && y <= 13) { row.push(T.CAVE); continue; }
          // Random terrain
          const r = rng();
          if (r < 0.03) row.push(T.ROCK);
          else if (r < 0.05) row.push(T.BUSH);
          else if (r < 0.08) row.push(T.TREE);
          else row.push(T.WASTELAND);
        }
        map.push(row);
      }
      return { map, w, h, cavePos: { x: 5, y: 11 }, playerStart: { x: 30, y: 15 } };
    }

    function generateCaveMap() {
      const rng = seededRng(88888);
      const w = 24, h = 16;
      const map = [];
      for (let y = 0; y < h; y++) {
        const row = [];
        for (let x = 0; x < w; x++) {
          // Walls around the perimeter
          if (x < 2 || x > w-3 || y < 2 || y > h-3) { row.push(T.CAVE_WALL); continue; }
          // Entrance at bottom center
          if (y === h-3 && x >= 10 && x <= 13) { row.push(T.CAVE_ENTRANCE); continue; }
          // Interior rocks
          const r = rng();
          if (r < 0.08) row.push(T.ROCK);
          else row.push(T.CAVE_FLOOR);
        }
        map.push(row);
      }
      return { map, w, h, playerStart: { x: 11, y: h-4 } };
    }

    function generateDarkCaveMap() {
      const rng = seededRng(99999);
      const w = 20, h = 14;
      const map = [];
      for (let y = 0; y < h; y++) {
        const row = [];
        for (let x = 0; x < w; x++) {
          if (x < 2 || x > w-3 || y < 2 || y > h-3) { row.push(T.CAVE_WALL); continue; }
          const r = rng();
          if (r < 0.06) row.push(T.ROCK);
          else row.push(T.CAVE_FLOOR);
        }
        map.push(row);
      }
      return { map, w, h, playerStart: { x: 10, y: h-4 } };
    }

    // ── COLORS (matching main game) ──────────────────────────────
    const COLORS = {
      grass: '#5a8f3d', grassDark: '#4a7f2d', water: '#3d7aaf', waterLight: '#5d9acf',
      tree: '#2d5a1d', treeTrunk: '#8b4513', flower: '#ff69b4', flowerYellow: '#ffd700',
      path: '#c9a86c', rock: '#808080', bush: '#3d6f2d', treeOfLife: '#ffd700',
      treeOfKnowledge: '#8b0000', sky: '#87ceeb',

    let gameTime = 0;

    // ── CHARACTER SPRITE (exact copy from main game) ────────────
    const drawCharacterSprite = (ctx, screenX, screenY, opts) => {
      const {
        walkFrame = 0, isMoving = false, direction = 'down',
        hairColor = '#1a1a1a', bodyColor = '#4169e1', skinColor = SKIN_COLOR,
        isEve = false, showClothes = false, hasFigLeaves = false,
        holdingFruit = false, isEating = false, hasGlory = false, gameTime: gt = 0,
      } = opts;

      const frame = Math.floor(walkFrame) % 4;
      const bob   = isMoving && frame % 2 === 1 ? 1 : 0;
      const cx    = screenX + 16;
      const by    = screenY + bob;

      const r = (dx, dy, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(cx + dx, by + dy, w, h); };

      const DK   = '#0d0700';
      const SH   = hasGlory ? '#ffdd44' : '#17100a';
      const FIG  = '#3a7a2a';
      const COAT = '#c4a882';
      const glorySkin = hasGlory ? '#ffdd44' : null;
      const bClr = showClothes ? COAT : (glorySkin || bodyColor);
      const legClr = showClothes ? COAT : (hasFigLeaves ? FIG : (glorySkin || bodyColor));
      const sClr = glorySkin || skinColor;

      // GLORY AURA
      if (hasGlory) {
        const pulse = Math.sin((gt || 0) * 0.12) * 6;
        ctx.shadowColor = '#ffe040';
        ctx.shadowBlur  = 22 + pulse;
        ctx.fillStyle   = 'rgba(255,225,50,0.18)';
        ctx.beginPath(); ctx.ellipse(cx, by + 14, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,235,80,0.25)';
        ctx.beginPath(); ctx.ellipse(cx, by + 14, 12, 15, 0, 0, Math.PI * 2); ctx.fill();
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur  = 14 + pulse * 0.5;
      }

      const isSide = direction === 'left' || direction === 'right';

      // LEGS
      if (isSide) {
        const dir = direction === 'right' ? 1 : -1;
        const fStep = !isMoving ? 0 : frame === 1 ?  2*dir : frame === 3 ? -2*dir : 0;
        const bStep = !isMoving ? 0 : frame === 1 ? -2*dir : frame === 3 ?  2*dir : 0;
        r(-3, 20, 6, 6, legClr);
        r(-4 + bStep, 26, 7, 2, legClr);
        r(-4 + fStep, 26, 7, 2, SH);
      } else if (!isMoving) {
        r(-5, 20, 4, 6, legClr);  r(-6, 26, 6, 2, SH);
        r( 1, 20, 4, 6, legClr);  r( 0, 26, 6, 2, SH);
      } else {
        const fwdX = frame < 2 ? -5 :  1;
        const bckX = frame < 2 ?  1 : -5;
        r(bckX, 20, 4, 4, legClr);  r(bckX - 1, 24, 5, 2, SH);
        r(fwdX, 20, 4, 6, legClr);  r(fwdX - 1, 26, 6, 2, SH);
      }
      if (hasFigLeaves && isEve && !showClothes) {
        if (isSide) { r(-3, 23, 6, 3, skinColor); }
        else if (!isMoving) { r(-5, 23, 4, 3, skinColor); r( 1, 23, 4, 3, skinColor); }
        else { const fwdX = frame < 2 ? -5 : 1; const bckX = frame < 2 ? 1 : -5; r(bckX, 22, 4, 2, skinColor); r(fwdX, 23, 4, 3, skinColor); }
      }

      // BODY
      r(-6, 12, 12, 9, DK);
      r(-5, 13, 10, 7, bClr);
      if (hasFigLeaves && isEve && !showClothes) { r(-5, 16, 10, 4, FIG); }

      // ARMS
      if (isSide) {
        const aSwg = isMoving ? (frame < 2 ? 2 : -2) : 0;
        r(-2, 13 + aSwg, 4, 8, DK);
        r(-1, 14 + aSwg, 2, 6, sClr);
      } else {
        const armSwg = isMoving ? (frame < 2 ? 2 : -2) : 0;
        r(-8, 13 + armSwg, 3, 7, DK);  r(-8, 14 + armSwg, 2, 5, sClr);
        r( 5, 13 - armSwg, 3, 7, DK);  r( 5, 14 - armSwg, 2, 5, sClr);
      }

      // HEAD
      r(-7, 0, 14, 14, DK);
      r(-6, 1, 12, 12, sClr);

      // HAIR
      if (direction === 'up') {
        r(-6, 1, 12, 12, hairColor);
      } else if (direction === 'left') {
        r(-6, 1, 12, 7, hairColor);
        r( 3, 1,  3, 12, hairColor);
      } else if (direction === 'right') {
        r(-6, 1, 12, 7, hairColor);
        r(-6, 1,  3, 12, hairColor);
      } else {
        r(-6, 1, 12, 7, hairColor);
      }

      // Eve long hair strands
      if (isEve && direction !== 'up') {
        r(-9, 5, 3, 10, hairColor);
        r( 6, 5, 3, 10, hairColor);
      }

      // EYES
      if (direction !== 'up') {
        if (direction !== 'left') { r( 1, 9, 3, 3, '#f0f0f0'); r( 2, 10, 2, 2, DK); }
        if (direction !== 'right') { r(-4, 9, 3, 3, '#f0f0f0'); r(-4, 10, 2, 2, DK); }
      }

      if (holdingFruit && !isEating) {
        ctx.fillStyle = '#cc0000';
        ctx.beginPath(); ctx.arc(cx + 10, by + 17, 4, 0, Math.PI * 2); ctx.fill();
        r(8, 13, 2, 4, '#654321');
      }

      if (hasGlory) { ctx.shadowBlur = 0; }
    };

    // ── TILE DRAWING (matching main game) ───────────────────────
    function drawTile(mapX, mapY, tile, screenX, screenY) {
      const gh = ((mapX * 1234567 + mapY * 891011) >>> 0) % 100;
      const isCaveTile = tile === T.CAVE_FLOOR || tile === T.CAVE_WALL || tile === T.CAVE_ENTRANCE;

      // Ground base
      if (isCaveTile) {
        // Cave tiles get their own base
      } else if (tile === T.WASTELAND || tile === T.ROCK || tile === T.BUSH) {
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(screenX, screenY, TILE, TILE);
      } else if (tile === T.GRASS || tile === T.TREE) {
        const grassBases = ['#4e7c2b', '#527f2e', '#4a7828', '#568231', '#4c7a2c'];
        ctx.fillStyle = grassBases[gh % 5];
        ctx.fillRect(screenX, screenY, TILE, TILE);
        if (tile !== T.WATER && tile !== T.PATH) {
          if (gh < 18) {
            ctx.fillStyle = 'rgba(90,62,28,0.18)';
            ctx.fillRect(screenX + (gh * 5) % 44, screenY + (gh * 7) % 44, 14, 12);
          }
          ctx.fillStyle = '#3a6020';
          for (let bi = 0; bi < 5; bi++) ctx.fillRect(screenX + (gh*(bi+1)*13+mapX)%58+2, screenY + (gh*(bi+1)*7+mapY)%56+2, 2, 5);
          ctx.fillStyle = '#6aaa3e';
          for (let bi = 0; bi < 3; bi++) ctx.fillRect(screenX + (gh*(bi+4)*17)%58+2, screenY + (gh*(bi+4)*11)%56+2, 2, 3);
        }
      }

      switch (tile) {
        case T.WASTELAND: {
          const wh = ((mapX * 3457 + mapY * 7891) >>> 0) % 100;
          ctx.fillStyle = '#4a3a2a';
          ctx.fillRect(screenX, screenY, TILE, TILE);
          ctx.fillStyle = '#3a2a1a';
          for (let ci = 0; ci < 3; ci++) ctx.fillRect(screenX + (wh*(ci+1)*11)%56+4, screenY + (wh*(ci+1)*7)%56+4, 6, 2);
          ctx.fillStyle = '#5a4a3a';
          for (let ci = 0; ci < 2; ci++) ctx.fillRect(screenX + (wh*(ci+3)*17)%56+4, screenY + (wh*(ci+3)*13)%56+4, 4, 3);
          if (wh < 15) {
            ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
            ctx.strokeStyle = '#5a4a30'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(16, 24); ctx.lineTo(12, 16); ctx.moveTo(16, 24); ctx.lineTo(20, 16);
            ctx.moveTo(16, 20); ctx.lineTo(10, 14); ctx.moveTo(16, 20); ctx.lineTo(22, 14);
            ctx.stroke(); ctx.restore();
          }
          break;
        }
        case T.ROCK: {
          // Angular boulder like reference art — faceted stone with highlights
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          const rh = ((mapX * 4567 + mapY * 1234) >>> 0) % 100;
          // Shadow under rock
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.beginPath(); ctx.ellipse(16, 27, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
          // Main rock body (dark base)
          ctx.fillStyle = '#5a5352';
          ctx.beginPath();
          ctx.moveTo(6, 26); ctx.lineTo(3, 18); ctx.lineTo(7, 12);
          ctx.lineTo(14, 9); ctx.lineTo(22, 10); ctx.lineTo(28, 14);
          ctx.lineTo(30, 20); ctx.lineTo(27, 26); ctx.closePath();
          ctx.fill();
          // Mid-tone face
          ctx.fillStyle = '#706866';
          ctx.beginPath();
          ctx.moveTo(7, 24); ctx.lineTo(5, 17); ctx.lineTo(10, 12);
          ctx.lineTo(18, 10); ctx.lineTo(24, 13); ctx.lineTo(26, 20);
          ctx.lineTo(22, 25); ctx.closePath();
          ctx.fill();
          // Light face (top highlight)
          ctx.fillStyle = '#8a8280';
          ctx.beginPath();
          ctx.moveTo(10, 14); ctx.lineTo(16, 11); ctx.lineTo(22, 13);
          ctx.lineTo(20, 18); ctx.lineTo(12, 17); ctx.closePath();
          ctx.fill();
          // Crack lines
          ctx.strokeStyle = '#4a4240';
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(14, 11); ctx.lineTo(16, 18); ctx.lineTo(12, 24);
          ctx.stroke();
          if (rh > 50) {
            ctx.beginPath();
            ctx.moveTo(20, 12); ctx.lineTo(22, 20);
            ctx.stroke();
          }
          // Top edge highlight
          ctx.strokeStyle = '#9a9492';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(8, 13); ctx.lineTo(14, 10); ctx.lineTo(22, 11);
          ctx.stroke();
          ctx.restore();
          break;
        }
        case T.TREE:
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          ctx.fillStyle = COLORS.treeTrunk; ctx.fillRect(12, 16, 8, 16);
          ctx.fillStyle = COLORS.tree;
          ctx.beginPath(); ctx.arc(16, 12, 14, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.10)';
          ctx.beginPath(); ctx.arc(13, 8, 7, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
          break;
        case T.CAVE: {
          // Rocky hill/mound with dark cave opening — like reference art
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          // Shadow at base
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.beginPath(); ctx.ellipse(16, 30, 16, 4, 0, 0, Math.PI * 2); ctx.fill();
          // Hill/mound shape (dark brown base)
          ctx.fillStyle = '#5a4a3a';
          ctx.beginPath();
          ctx.moveTo(0, 32); ctx.lineTo(2, 18); ctx.lineTo(6, 10);
          ctx.lineTo(12, 4); ctx.lineTo(20, 3); ctx.lineTo(26, 6);
          ctx.lineTo(30, 12); ctx.lineTo(32, 20); ctx.lineTo(32, 32);
          ctx.closePath(); ctx.fill();
          // Mid rock layer
          ctx.fillStyle = '#6a5a4a';
          ctx.beginPath();
          ctx.moveTo(2, 30); ctx.lineTo(4, 16); ctx.lineTo(8, 9);
          ctx.lineTo(14, 5); ctx.lineTo(22, 5); ctx.lineTo(27, 10);
          ctx.lineTo(30, 18); ctx.lineTo(30, 30); ctx.closePath();
          ctx.fill();
          // Light highlight on top
          ctx.fillStyle = '#7a6a5a';
          ctx.beginPath();
          ctx.moveTo(8, 12); ctx.lineTo(14, 6); ctx.lineTo(22, 6);
          ctx.lineTo(26, 10); ctx.lineTo(22, 14); ctx.lineTo(12, 14);
          ctx.closePath(); ctx.fill();
          // Top edge bright highlight
          ctx.strokeStyle = '#8a7a6a';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(6, 11); ctx.lineTo(12, 5); ctx.lineTo(20, 4);
          ctx.lineTo(26, 7); ctx.stroke();
          // Rock crack details
          ctx.strokeStyle = '#4a3a2a';
          ctx.lineWidth = 0.7;
          ctx.beginPath(); ctx.moveTo(10, 8); ctx.lineTo(12, 16); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(22, 7); ctx.lineTo(24, 14); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(6, 20); ctx.lineTo(10, 26); ctx.stroke();
          // Dark cave opening (arch shape)
          ctx.fillStyle = '#1a0a00';
          ctx.beginPath();
          ctx.moveTo(10, 30); ctx.lineTo(10, 20);
          ctx.quadraticCurveTo(10, 14, 16, 14);
          ctx.quadraticCurveTo(22, 14, 22, 20);
          ctx.lineTo(22, 30); ctx.closePath();
          ctx.fill();
          // Inner shadow gradient in opening
          ctx.fillStyle = '#0a0000';
          ctx.beginPath();
          ctx.moveTo(12, 30); ctx.lineTo(12, 22);
          ctx.quadraticCurveTo(12, 17, 16, 17);
          ctx.quadraticCurveTo(20, 17, 20, 22);
          ctx.lineTo(20, 30); ctx.closePath();
          ctx.fill();
          // Subtle moss at base
          ctx.fillStyle = '#3a5a2a';
          ctx.fillRect(2, 28, 4, 2);
          ctx.fillRect(26, 29, 3, 2);
          ctx.fillRect(5, 30, 3, 1);
          ctx.restore();
          break;
        }
        case T.GRASS:
          // Already drawn in ground base above
          break;
        case T.PATH: {
          const ph = ((mapX * 2345 + mapY * 6789) >>> 0) % 100;
          ctx.fillStyle = '#9b7d52';
          ctx.fillRect(screenX, screenY, TILE, TILE);
          ctx.fillStyle = '#7a6040';
          for (let pi = 0; pi < 4; pi++) ctx.fillRect(screenX + (ph*(pi+1)*11)%56+4, screenY + (ph*(pi+1)*7)%56+4, 5, 3);
          ctx.fillStyle = '#c0a070';
          for (let pi = 0; pi < 3; pi++) ctx.fillRect(screenX + (ph*(pi+4)*17)%56+4, screenY + (ph*(pi+4)*13)%56+4, 3, 2);
          break;
        }
        case T.WATER:
          ctx.fillStyle = (gameTime + mapX + mapY) % 20 < 10 ? COLORS.water : COLORS.waterLight;
          ctx.fillRect(screenX, screenY, TILE, TILE);
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fillRect(screenX + ((gameTime + mapX*3)%48)+4, screenY + ((gameTime*2+mapY*5)%48)+4, 18, 4);
          break;
        case T.BUSH:
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          ctx.fillStyle = COLORS.bush; ctx.beginPath(); ctx.arc(16, 20, 10, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
          break;
        case T.CAVE_FLOOR: {
          // Sandy/rocky cave floor with pebbles — like reference art interior
          const cfh = ((mapX * 3457 + mapY * 7891) >>> 0) % 100;
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          // Base sandy brown
          ctx.fillStyle = '#8a7a68';
          ctx.fillRect(0, 0, 32, 32);
          // Darker patches
          ctx.fillStyle = '#7a6a58';
          ctx.fillRect((cfh * 3) % 20 + 2, (cfh * 5) % 20 + 2, 10, 8);
          ctx.fillRect((cfh * 7) % 18 + 6, (cfh * 2) % 18 + 10, 8, 10);
          // Lighter sandy spots
          ctx.fillStyle = '#9a8a78';
          ctx.fillRect((cfh * 11) % 22 + 4, (cfh * 9) % 22 + 4, 6, 4);
          ctx.fillRect((cfh * 13) % 20 + 8, (cfh * 4) % 20 + 14, 5, 3);
          // Pebbles
          ctx.fillStyle = '#6a6258';
          if (cfh < 50) {
            ctx.beginPath(); ctx.arc(8 + (cfh % 10), 24 + (cfh % 6), 2.5, 0, Math.PI * 2); ctx.fill();
          }
          if (cfh > 30) {
            ctx.fillStyle = '#7a7268';
            ctx.beginPath(); ctx.arc(22 + (cfh % 6), 10 + (cfh % 8), 2, 0, Math.PI * 2); ctx.fill();
          }
          // Subtle crack marks
          ctx.strokeStyle = '#6a5a48';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo((cfh * 3) % 16 + 4, (cfh * 7) % 16 + 4);
          ctx.lineTo((cfh * 3) % 16 + 12, (cfh * 7) % 16 + 10);
          ctx.stroke();
          ctx.restore();
          break;
        }
        case T.CAVE_WALL: {
          // Rocky cave wall with stone faces and moss — like reference art
          const cwh = ((mapX * 5678 + mapY * 9012) >>> 0) % 100;
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          // Dark base
          ctx.fillStyle = '#3a3230';
          ctx.fillRect(0, 0, 32, 32);
          // Stone face pattern (irregular blocks)
          ctx.fillStyle = '#4a4240';
          ctx.fillRect(1, 1, 14, 10);
          ctx.fillRect(16, 2, 15, 12);
          ctx.fillRect(2, 12, 12, 9);
          ctx.fillRect(15, 15, 16, 8);
          ctx.fillRect(0, 22, 10, 10);
          ctx.fillRect(11, 24, 12, 8);
          ctx.fillRect(24, 24, 8, 8);
          // Lighter highlights on stone faces
          ctx.fillStyle = '#5a5452';
          ctx.fillRect(2, 2, 12, 4);
          ctx.fillRect(17, 3, 13, 5);
          ctx.fillRect(3, 13, 10, 4);
          ctx.fillRect(16, 16, 14, 3);
          // Crack/mortar lines
          ctx.strokeStyle = '#2a2220';
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(15, 0); ctx.lineTo(15, 12);
          ctx.moveTo(0, 11); ctx.lineTo(32, 11);
          ctx.moveTo(14, 12); ctx.lineTo(14, 23);
          ctx.moveTo(0, 22); ctx.lineTo(32, 23);
          ctx.moveTo(10, 23); ctx.lineTo(10, 32);
          ctx.moveTo(23, 23); ctx.lineTo(23, 32);
          ctx.stroke();
          // Moss / lichen patches
          if (cwh < 40) {
            ctx.fillStyle = '#3a5a2a';
            ctx.fillRect(1 + (cwh % 8), 10, 3, 2);
            ctx.fillStyle = '#4a6a3a';
            ctx.fillRect(20 + (cwh % 6), 22, 4, 2);
          }
          if (cwh > 60) {
            ctx.fillStyle = '#3a5a2a';
            ctx.fillRect(8, 21, 3, 2);
          }
          ctx.restore();
          break;
        }
        case T.CAVE_ENTRANCE: {
          // Cave entrance with light streaming in — transition from outside
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          // Sandy floor base
          ctx.fillStyle = '#8a7a68';
          ctx.fillRect(0, 0, 32, 32);
          // Rocky arch sides
          ctx.fillStyle = '#4a4240';
          ctx.fillRect(0, 0, 6, 32);
          ctx.fillRect(26, 0, 6, 32);
          // Stone detail on arch
          ctx.fillStyle = '#5a5452';
          ctx.fillRect(1, 2, 4, 8);
          ctx.fillRect(27, 4, 4, 10);
          ctx.fillRect(1, 14, 4, 6);
          ctx.fillRect(27, 18, 4, 8);
          // Light from outside (warm glow on floor)
          const lgrd = ctx.createLinearGradient(8, 32, 8, 0);
          lgrd.addColorStop(0, 'rgba(255, 220, 150, 0.25)');
          lgrd.addColorStop(1, 'rgba(255, 220, 150, 0.02)');
          ctx.fillStyle = lgrd;
          ctx.fillRect(6, 0, 20, 32);
          // Mortar lines
          ctx.strokeStyle = '#3a3230';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(0, 10); ctx.lineTo(6, 10);
          ctx.moveTo(0, 20); ctx.lineTo(6, 20);
          ctx.moveTo(26, 14); ctx.lineTo(32, 14);
          ctx.moveTo(26, 26); ctx.lineTo(32, 26);
          ctx.stroke();
          ctx.restore();
          break;
        }
        default:
          ctx.fillStyle = '#4a3a2a';
          ctx.fillRect(screenX, screenY, TILE, TILE);
      }
    }

    // ── LEVEL RENDERING ─────────────────────────────────────────
    function renderLevel() {
      if (!canvas || !ctx || !levelMap) return;

      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;

      const vpW = Math.ceil(canvas.width / TILE) + 2;
      const vpH = Math.ceil(canvas.height / TILE) + 2;

      // Camera follows player
      cameraX = player.x - vpW / 2 + 0.5;
      cameraY = player.y - vpH / 2 + 0.5;
      cameraX = Math.max(0, Math.min(levelW - vpW, cameraX));
      cameraY = Math.max(0, Math.min(levelH - vpH, cameraY));

      const chapter = CHAPTERS[currentChapter];
      const isDark = chapter && chapter.levelType === 'dark_cave';
      const isCave = chapter && (chapter.levelType === 'cave_interior' || chapter.levelType === 'dark_cave');

      // Sky / background color matching main game
      ctx.fillStyle = isCave ? '#1a0a00' : '#5a4a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw tiles
      for (let vy = 0; vy < vpH; vy++) {
        for (let vx = 0; vx < vpW; vx++) {
          const mx = Math.floor(cameraX + vx);
          const my = Math.floor(cameraY + vy);
          if (mx < 0 || my < 0 || mx >= levelW || my >= levelH) continue;
          const sx = (mx - cameraX) * TILE;
          const sy = (my - cameraY) * TILE;
          drawTile(mx, my, levelMap[my][mx], sx, sy);
        }
      }

      // Collect entities for Y-sorting (NPCs + player)
      const sortedEntities = [];

      // NPCs
      if (chapter) {
        chapter.npcs.forEach(npc => {
          const sx = (npc.x - cameraX) * TILE;
          const sy = (npc.y - cameraY) * TILE;
          if (sx > -TILE * 2 && sx < canvas.width + TILE * 2 && sy > -TILE * 2 && sy < canvas.height + TILE * 2) {
            sortedEntities.push({ type: 'npc', npc, screenX: sx, screenY: sy, mapY: npc.y });
          }
        });
      }

      // Player
      const px = (player.x - cameraX) * TILE;
      const py = (player.y - cameraY) * TILE;
      sortedEntities.push({ type: 'player', screenX: px, screenY: py, mapY: player.y });

      // Sort by Y for proper overlap
      sortedEntities.sort((a, b) => a.mapY - b.mapY);

      // Draw sorted entities
      sortedEntities.forEach(ent => {
        if (ent.type === 'npc') {
          const npc = ent.npc;
          ctx.save(); ctx.translate(ent.screenX, ent.screenY); ctx.scale(SCALE, SCALE);
          drawCharacterSprite(ctx, 0, 0, {
            walkFrame: 0, isMoving: false, direction: 'down',
            hairColor: npc.hairColor, bodyColor: npc.isEve ? '#8b2252' : '#8b6914',
            skinColor: npc.color, isEve: !!npc.isEve,
            showClothes: true, gameTime,
          });
          ctx.restore();
          // Name tag
          ctx.fillStyle = '#facc15';
          ctx.font = 'bold 12px Georgia';
          ctx.textAlign = 'center';
          ctx.fillText(npc.name, ent.screenX + TILE/2, ent.screenY - 4);
          ctx.textAlign = 'left';
        } else {
          ctx.save(); ctx.translate(ent.screenX, ent.screenY); ctx.scale(SCALE, SCALE);
          drawCharacterSprite(ctx, 0, 0, {
            walkFrame: player.frame, isMoving: player.moving, direction: player.dir,
            hairColor: '#1a1a1a', bodyColor: '#4169e1', skinColor: SKIN_COLOR,
            gameTime,
          });
          ctx.restore();
        }
      });

      // Dark cave: darkness vignette around player
      if (isDark) {
        const grad = ctx.createRadialGradient(
          px + TILE/2, py + 32, TILE * 1.8,
          px + TILE/2, py + 32, TILE * 4
        );
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.92)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    // ── GAME LOOP ───────────────────────────────────────────────
    function gameLoop(timestamp) {
      if (phase !== 'LEVEL') { animFrame = requestAnimationFrame(gameLoop); return; }

      const dt = timestamp - lastTime;
      lastTime = timestamp;
      moveTimer += dt;
      gameTime++;

      // Movement
      if (!dialogueActive && moveTimer > 100) {
        moveTimer = 0;
        let dx = 0, dy = 0;
        const dir = touchDir || (keys.ArrowUp || keys.w ? 'up' : keys.ArrowDown || keys.s ? 'down' : keys.ArrowLeft || keys.a ? 'left' : keys.ArrowRight || keys.d ? 'right' : null);
        if (dir === 'up') dy = -1;
        else if (dir === 'down') dy = 1;
        else if (dir === 'left') dx = -1;
        else if (dir === 'right') dx = 1;

        if (dx || dy) {
          player.dir = dir;
          player.moving = true;
          player.frame++;
          const nx = player.x + dx;
          const ny = player.y + dy;
          if (nx >= 0 && nx < levelW && ny >= 0 && ny < levelH) {
            const tile = levelMap[ny][nx];
            if (!SOLID.has(tile)) {
              player.x = nx;
              player.y = ny;
              // Check cave arrival
              checkLevelTriggers();
            }
          }
        } else {
          player.moving = false;
        }
      }

      renderLevel();
      animFrame = requestAnimationFrame(gameLoop);
    }

    function checkLevelTriggers() {
      const chapter = CHAPTERS[currentChapter];
      if (!chapter || questComplete) return;

      // Check if near cave in chapter 1
      if (chapter.levelType === 'wasteland_to_cave') {
        const tile = levelMap[player.y][player.x];
        if (tile === T.CAVE && !caveFound) {
          caveFound = true;
          questComplete = true;
          showNarration("You have found the Cave of Treasures! A dark opening in the rock, below the western border of the garden.", function() {
            completeLevel();
          });
        }
      }
      // Check proximity to NPCs for interaction hint
      updateInteractTarget();
    }

    function updateInteractTarget() {
      const chapter = CHAPTERS[currentChapter];
      if (!chapter) return;
      interactTarget = null;
      chapter.npcs.forEach(npc => {
        const dist = Math.abs(npc.x - player.x) + Math.abs(npc.y - player.y);
        if (dist <= 2) interactTarget = npc;
      });
    }

    function interact() {
      if (dialogueActive) {
        advanceDialogue();
        return;
      }
      if (interactTarget) {
        startDialogue(interactTarget);
        return;
      }
      // Check if standing on cave
      if (levelMap && levelMap[player.y] && levelMap[player.y][player.x] === T.CAVE) {
        if (!questComplete) {
          caveFound = true;
          questComplete = true;
          showNarration("You have found the Cave of Treasures!", function() {
            completeLevel();
          });
        }
      }
      // Check cave entrance in chapter 2
      const ch = CHAPTERS[currentChapter];
      if (ch && ch.levelType === 'cave_interior') {
        if (!questComplete) {
          // Just exploring
          const tile = levelMap[player.y][player.x];
          if (tile === T.CAVE_ENTRANCE) {
            showNarration("The cave entrance. The light from outside barely reaches in here.", null);
          }
        }
      }
    }

    // ── DIALOGUE SYSTEM ─────────────────────────────────────────
    let narrationCallback = null;

    function startDialogue(npc) {
      dialogueActive = true;
      dialogueNpc = npc;
      dialogueLine = 0;
      render();
    }

    function advanceDialogue() {
      if (narrationCallback) {
        const cb = narrationCallback;
        narrationCallback = null;
        dialogueActive = false;
        dialogueNpc = null;
        render();
        cb();
        return;
      }
      if (!dialogueNpc) { dialogueActive = false; render(); return; }
      dialogueLine++;
      if (dialogueLine >= dialogueNpc.dialogue.length) {
        dialogueActive = false;
        dialogueNpc = null;
        dialogueLine = 0;
        // After talking to both NPCs in cave chapters, complete
        const ch = CHAPTERS[currentChapter];
        if (ch && (ch.levelType === 'cave_interior' || ch.levelType === 'dark_cave')) {
          if (!questComplete) {
            const talked = ch.npcs.filter(n => n._talked);
            dialogueNpc && (dialogueNpc._talked = true);
            if (talked.length >= ch.npcs.length - 1) {
              questComplete = true;
              setTimeout(() => {
                showNarration("You have heard their words. The chapter is complete.", function() {
                  completeLevel();
                });
              }, 500);
            }
          }
        }
      }
      if (dialogueNpc) dialogueNpc._talked = true;
      render();
    }

    function showNarration(text, callback) {
      dialogueActive = true;
      dialogueNpc = { name: 'Narrator', dialogue: [text], _isNarrator: true };
      dialogueLine = 0;
      narrationCallback = callback;
      render();
    }

    function completeLevel() {
      phase = 'CHAPTER_COMPLETE';
      render();
    }

    // ── START LEVEL ─────────────────────────────────────────────
    function startLevel(chapterIndex) {
      currentChapter = chapterIndex;
      const chapter = CHAPTERS[chapterIndex];
      questComplete = false;
      caveFound = false;
      dialogueActive = false;
      dialogueNpc = null;
      interactTarget = null;
      chapter.npcs.forEach(n => n._talked = false);

      let levelData;
      if (chapter.levelType === 'wasteland_to_cave') {
        levelData = generateWastelandMap();
      } else if (chapter.levelType === 'cave_interior') {
        levelData = generateCaveMap();
      } else if (chapter.levelType === 'dark_cave') {
        levelData = generateDarkCaveMap();
      }

      levelMap = levelData.map;
      levelW = levelData.w;
      levelH = levelData.h;
      player.x = levelData.playerStart.x;
      player.y = levelData.playerStart.y;
      player.dir = 'down';
      player.moving = false;
      player.frame = 0;

      phase = 'LEVEL';
      render();

      if (!animFrame) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(gameLoop);
      }
    }

    // ── MAIN RENDER ─────────────────────────────────────────────
    function render() {
      const root = document.getElementById('root');
      let html = '';

      // ── TITLE SCREEN ──
      if (phase === 'TITLE') {

      // ── PROLOGUE ──

        html = `

              <div class="section-banner">
                <div class="banner-bg"></div>

              </div>

              </div>

                <button class="nav-btn secondary" onclick="phase='TITLE';render();">&#9664; Back</button>
                <button class="nav-btn" onclick="startChapterCutscene(0)">Begin Chapter I &#9654;</button>
              </div>
            </div>
          </div>`;
      }

      // ── CUTSCENE ──
      else if (phase === 'CUTSCENE') {
        const chapter = CHAPTERS[currentChapter];
        const slide = chapter.cutsceneSlides[cutsceneSlide];
        const isLast = cutsceneSlide >= chapter.cutsceneSlides.length - 1;
        html = `
          <div class="game-container">
            <canvas id="bgCanvas"></canvas>
            <div class="top-bar">
              <button class="back-btn" onclick="phase='PROLOGUE';render();">&#9664; Back</button>
              <span class="title-text">Chapter ${chapter.num}</span>
              <span style="color:#6b7280;font-size:0.8rem;">${cutsceneSlide + 1}/${chapter.cutsceneSlides.length}</span>
            </div>
            <div class="cutscene-overlay">
              <div class="cutscene-header">
                <p class="cutscene-day">${chapter.title}</p>
              </div>
              <div class="cutscene-box">
                <p class="cutscene-ref">${slide.ref}</p>
                ${slide.lines.map(l => `<p class="cutscene-verse">${l}</p>`).join('')}
                <button class="cutscene-btn" onclick="advanceCutscene()">
                  ${isLast ? 'Enter the Scene \u25B6' : 'Continue \u25B6'}
                </button>
              </div>
            </div>
          </div>`;
      }

      // ── PLAYABLE LEVEL ──
      else if (phase === 'LEVEL') {
        const chapter = CHAPTERS[currentChapter];
        html = `
          <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            <div class="top-bar">
              <button class="back-btn" onclick="pauseLevel()">&#9664;</button>
              <span class="title-text">Ch. ${chapter.num} — ${chapter.title}</span>
              <button class="read-btn" onclick="openReadMode()">Read</button>
            </div>
            <p class="quest-text">${questComplete ? '&#10004; ' + chapter.quest : '\u2606 ' + chapter.quest}</p>
            ${dialogueActive && dialogueNpc ? `
              <div class="dialogue-box${dialogueNpc._isNarrator ? ' scene-dialogue' : ''}">
                <div class="dialogue-header">
                  <span class="dialogue-name" style="color:${dialogueNpc._isNarrator ? '#fde047' : '#facc15'};">${dialogueNpc.name}</span>
                  <span class="dialogue-counter">${dialogueLine + 1}/${dialogueNpc.dialogue.length}</span>
                </div>
                <p class="${dialogueNpc._isNarrator ? 'scene-text' : 'dialogue-text'}">${dialogueNpc.dialogue[dialogueLine]}</p>
                <button class="btn" onclick="advanceDialogue()">${dialogueLine < dialogueNpc.dialogue.length - 1 ? 'Next \u25B6' : 'Continue \u25B6'}</button>
              </div>
            ` : ''}
            <div class="controls">
              <div class="dpad">
                <div></div>
                <button class="dpad-btn" ontouchstart="touchDir='up'" ontouchend="touchDir=null" onmousedown="touchDir='up'" onmouseup="touchDir=null">\u25B2</button>
                <div></div>
                <button class="dpad-btn" ontouchstart="touchDir='left'" ontouchend="touchDir=null" onmousedown="touchDir='left'" onmouseup="touchDir=null">\u25C0</button>
                <div></div>
                <button class="dpad-btn" ontouchstart="touchDir='right'" ontouchend="touchDir=null" onmousedown="touchDir='right'" onmouseup="touchDir=null">\u25B6</button>
                <div></div>
                <button class="dpad-btn" ontouchstart="touchDir='down'" ontouchend="touchDir=null" onmousedown="touchDir='down'" onmouseup="touchDir=null">\u25BC</button>
                <div></div>
              </div>
              <button class="talk-btn" onclick="interact()">TALK</button>
            </div>
          </div>`;
      }

      // ── READ MODE (parchment overlay) ──
      else if (phase === 'READ') {
        const chapter = CHAPTERS[currentChapter];
        html = `
          <div class="game-container">
            <canvas id="bgCanvas"></canvas>
            <div class="parchment-overlay">
              <div class="section-banner">
                <div class="banner-bg"></div>
                <div class="banner-overlay"></div>
                <div class="banner-content">
                  <div class="banner-title">Chapter ${chapter.num}</div>
                  <div class="banner-subtitle">${chapter.subtitle}</div>
                </div>
              </div>
              <div class="icon-bar">
                <button class="icon-btn check" style="background:#4a7a4a;color:white;">&#10004;</button>
                <button class="icon-btn share" style="background:rgba(60,50,30,0.15);color:#5a4a30;">&#9993;</button>
                <button class="icon-btn settings" style="background:rgba(60,50,30,0.15);color:#5a4a30;">&#9881;</button>
              </div>
              <div class="content-body">
                ${chapter.verses.map(v => `<p><span class="verse-num">${v.match(/^\d+/)[0]}</span> ${v.replace(/^\d+\s*/, '')}</p>`).join('')}
              </div>
              <div class="nav-bar">
                <button class="nav-btn secondary" onclick="closeReadMode()">&#9664; Return to Level</button>
                ${currentChapter < CHAPTERS.length - 1 ? `<button class="nav-btn" onclick="startChapterCutscene(${currentChapter + 1})">Chapter ${CHAPTERS[currentChapter + 1].num} &#9654;</button>` : ''}
              </div>
            </div>
          </div>`;
      }

      // ── CHAPTER COMPLETE ──
      else if (phase === 'CHAPTER_COMPLETE') {
        const chapter = CHAPTERS[currentChapter];
        const hasNext = currentChapter < CHAPTERS.length - 1;
        html = `
          <div class="game-container">
            <canvas id="bgCanvas"></canvas>
            <div class="menu-overlay" style="background:linear-gradient(180deg, #000 0%, #0a0a0a 50%, #111 100%);">
              <p style="color:#c8a96e;font-size:14px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;">Chapter Complete</p>
              <h1 style="color:#e8d8a8;font-size:28px;font-family:Georgia,serif;margin-bottom:8px;text-align:center;">${chapter.title}</h1>
              <p style="color:#888;font-size:14px;font-style:italic;margin-bottom:40px;text-align:center;max-width:400px;line-height:1.6;">
                ${chapter.subtitle}
              </p>
              <button class="menu-btn" style="margin-bottom:12px;min-width:280px;" onclick="openReadMode()">Read Full Chapter</button>
              ${hasNext ? `<button class="menu-btn" style="margin-bottom:12px;min-width:280px;" onclick="startChapterCutscene(${currentChapter + 1})">Continue to Chapter ${CHAPTERS[currentChapter + 1].num} &#9654;</button>` : ''}
              <button class="menu-btn secondary" style="min-width:280px;" onclick="phase='TITLE';render();">Table of Contents</button>
            </div>
          </div>`;
      }

      root.innerHTML = html;

      // Setup canvas for level
      if (phase === 'LEVEL') {
        canvas = document.getElementById('gameCanvas');
        if (canvas) {
          ctx = canvas.getContext('2d');
          canvas.width = canvas.clientWidth;
          canvas.height = canvas.clientHeight;
          renderLevel();
        }
      }
      // Background canvas for non-level phases
      else {
        const bg = document.getElementById('bgCanvas');
        if (bg) {
          const bgCtx = bg.getContext('2d');
          bg.width = bg.clientWidth;
          bg.height = bg.clientHeight;
          // Dark gradient background
          const grad = bgCtx.createLinearGradient(0, 0, 0, bg.height);
          grad.addColorStop(0, '#1a2a1a');
          grad.addColorStop(1, '#0a0a05');
          bgCtx.fillStyle = grad;
          bgCtx.fillRect(0, 0, bg.width, bg.height);
          // Stars
          const rng = seededRng(42);
          bgCtx.fillStyle = 'rgba(255,255,255,0.4)';
          for (let i = 0; i < 60; i++) {
            bgCtx.fillRect(rng() * bg.width, rng() * bg.height, 2, 2);
          }
        }
      }
    }

    // ── PHASE TRANSITIONS ───────────────────────────────────────
    function startPrologue() {
      phase = 'PROLOGUE';
      render();
    }

    function startChapterCutscene(chapterIndex) {
      currentChapter = chapterIndex;
      cutsceneSlide = 0;
      phase = 'CUTSCENE';
      render();
    }

    function advanceCutscene() {
      const chapter = CHAPTERS[currentChapter];
      cutsceneSlide++;
      if (cutsceneSlide >= chapter.cutsceneSlides.length) {
        startLevel(currentChapter);
      } else {
        render();
      }
    }

    function openReadMode() {
      phase = 'READ';
      render();
    }

    function closeReadMode() {
      phase = 'LEVEL';
      render();
      if (!animFrame) {
        lastTime = performance.now();
        animFrame = requestAnimationFrame(gameLoop);
      }
    }

    function pauseLevel() {
      phase = 'CHAPTER_COMPLETE';
      render();
    }

    // ── INPUT ───────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (phase === 'LEVEL') interact();
        else if (phase === 'CUTSCENE') advanceCutscene();
      }
      if (e.key === 'Escape') {
        if (phase === 'LEVEL') pauseLevel();
        else if (phase === 'READ') closeReadMode();
      }
    });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // Prevent default touch scrolling
    document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

    // ── INIT ────────────────────────────────────────────────────
    render();
    lastTime = performance.now();
    animFrame = requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
