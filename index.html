          case 'firmament': {
            // waters above (top third)
            const wg1 = ctx.createLinearGradient(0, 0, 0, H * 0.3);
            wg1.addColorStop(0, '#1a2a5c');
            wg1.addColorStop(1, '#2d5aaf');
            ctx.fillStyle = wg1;
            ctx.fillRect(0, 0, W, H * 0.3);
            // ripples above
            ctx.strokeStyle = 'rgba(120,180,255,0.2)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 6; i++) {
              const ry = H * 0.05 + i * H * 0.04;
              ctx.beginPath();
              for (let x = 0; x < W; x += 4) {
                const yy = ry + Math.sin(x * 0.02 + t * 0.05 + i * 2) * 4;
                x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
              }
              ctx.stroke();
            }
            // firmament band (middle)
            const fg = ctx.createLinearGradient(0, H * 0.3, 0, H * 0.7);
            fg.addColorStop(0, '#5ba3d9');
            fg.addColorStop(0.5, '#87ceeb');
            fg.addColorStop(1, '#5ba3d9');
            ctx.fillStyle = fg;
            ctx.fillRect(0, H * 0.3, W, H * 0.4);
            // label
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.font = `bold ${Math.max(14, W * 0.03)}px Georgia, serif`;
            ctx.textAlign = 'center';
            ctx.fillText('SHAMAYIM', cx, cy + 5);
            ctx.textAlign = 'left';
            // waters below (bottom third)
            const wg2 = ctx.createLinearGradient(0, H * 0.7, 0, H);
            wg2.addColorStop(0, '#2d5aaf');
            wg2.addColorStop(1, '#0a1a3c');
            ctx.fillStyle = wg2;
            ctx.fillRect(0, H * 0.7, W, H * 0.3);
            for (let i = 0; i < 6; i++) {
              const ry = H * 0.75 + i * H * 0.04;
              ctx.beginPath();
              for (let x = 0; x < W; x += 4) {
                const yy = ry + Math.sin(x * 0.015 + t * 0.04 + i * 3) * 5;
                x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
              }
              ctx.strokeStyle = 'rgba(80,140,220,0.18)';
              ctx.stroke();
            }
            break;
          }

          // ── 3: Land & Vegetation ────────────────────────────────────
          case 'land': {
            // sky
            const skyG = ctx.createLinearGradient(0, 0, 0, H * 0.5);
            skyG.addColorStop(0, '#87ceeb');
            skyG.addColorStop(1, '#b8e4f8');
            ctx.fillStyle = skyG;
            ctx.fillRect(0, 0, W, H * 0.5);
            // sea on left
            ctx.fillStyle = '#3d7aaf';
            ctx.fillRect(0, H * 0.5, W * 0.35, H * 0.5);
            for (let i = 0; i < 8; i++) {
              ctx.strokeStyle = 'rgba(100,180,255,0.2)';
              ctx.beginPath();
              for (let x = 0; x < W * 0.35; x += 3) {
                const yy = H * 0.55 + i * 20 + Math.sin(x * 0.03 + t * 0.06 + i) * 3;
                x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
              }
              ctx.stroke();
            }
            // land mass rising from right
            const landG = ctx.createLinearGradient(0, H * 0.45, 0, H);
            landG.addColorStop(0, '#8b7355');
            landG.addColorStop(0.3, '#6b5530');
            landG.addColorStop(1, '#4a3820');
            ctx.fillStyle = landG;
            ctx.beginPath();
            ctx.moveTo(W * 0.3, H);
            ctx.quadraticCurveTo(W * 0.35, H * 0.5, W * 0.5, H * 0.42);
            ctx.quadraticCurveTo(W * 0.7, H * 0.38, W, H * 0.45);
            ctx.lineTo(W, H);
            ctx.fill();
            // grass on top of land
            ctx.fillStyle = '#4e7c2b';
            ctx.beginPath();
            ctx.moveTo(W * 0.3, H);
            ctx.quadraticCurveTo(W * 0.35, H * 0.49, W * 0.5, H * 0.41);
            ctx.quadraticCurveTo(W * 0.7, H * 0.37, W, H * 0.44);
            ctx.lineTo(W, H * 0.45); ctx.quadraticCurveTo(W * 0.7, H * 0.38, W * 0.5, H * 0.42);
            ctx.quadraticCurveTo(W * 0.35, H * 0.5, W * 0.3, H);
            ctx.fill();
            // helper: get Y on the grass-top curve at a given X
            // The grass curve is two quadratic segments:
            //   seg1: (W*0.3,H) ctrl(W*0.35,H*0.49) to(W*0.5,H*0.41)
            //   seg2: (W*0.5,H*0.41) ctrl(W*0.7,H*0.37) to(W,H*0.44)
            const landY = (px) => {
              if (px <= W * 0.5) {
                const tt = Math.max(0, Math.min(1, (px - W * 0.3) / (W * 0.2)));
                const p0y = H, c0y = H * 0.49, p1y = H * 0.41;
                return (1-tt)*(1-tt)*p0y + 2*(1-tt)*tt*c0y + tt*tt*p1y;
              } else {
                const tt = Math.max(0, Math.min(1, (px - W * 0.5) / (W * 0.5)));
                const p0y = H * 0.41, c0y = H * 0.37, p1y = H * 0.44;
                return (1-tt)*(1-tt)*p0y + 2*(1-tt)*tt*c0y + tt*tt*p1y;
              }
            };
            // little trees sprouting on the land surface (emoji)
            const day3Trees = ['🌳', '🌲', '🌳', '🌴', '🌲', '🌳', '🌲'];
            for (let i = 0; i < 7; i++) {
              const tx = W * 0.42 + i * W * 0.08;
              const ty = landY(tx);          // base sits on the curve
              const sz = 18 + pr(i + 10) * 14;
              ctx.font = `${sz}px serif`;
              ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
              ctx.fillText(day3Trees[i], tx, ty + sz * 0.15);
            }
            ctx.textAlign = 'left';
            break;
          }

          // ── 4: Luminaries (sun, moon, stars) ────────────────────────
          case 'luminaries': {
            // gradient sky: dark blue left (night), warm right (day)
            const skyG = ctx.createLinearGradient(0, 0, W, 0);
            skyG.addColorStop(0, '#0a0a2e');
            skyG.addColorStop(0.45, '#1a1a4e');
            skyG.addColorStop(0.55, '#cc6600');
            skyG.addColorStop(1, '#ffd080');
            ctx.fillStyle = skyG;
            ctx.fillRect(0, 0, W, H);
            // stars on the dark side
            for (let i = 0; i < 80; i++) {
              const sx = pr(i) * W * 0.5;
              const sy = pr(i + 50) * H;
              const sr = 0.5 + pr(i + 100) * 1.8;
              const sa = 0.3 + 0.5 * Math.sin(t * 0.1 + i * 7);
              ctx.fillStyle = `rgba(255,255,220,${sa})`;
              ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
            }
            // moon (left)
            ctx.fillStyle = '#e8e8d0';
            ctx.shadowColor = '#e8e8ff'; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.arc(W * 0.2, H * 0.3, 35, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            // moon dark side (crescent)
            ctx.fillStyle = '#0a0a2e';
            ctx.beginPath(); ctx.arc(W * 0.2 + 12, H * 0.3 - 2, 30, 0, Math.PI * 2); ctx.fill();
            // sun (right)
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 40 + Math.sin(t * 0.08) * 10;
            ctx.fillStyle = '#ffe066';
            ctx.beginPath(); ctx.arc(W * 0.78, H * 0.35, 45, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            // sun rays
            ctx.save(); ctx.globalAlpha = 0.2;
            for (let i = 0; i < 16; i++) {
              const a = (i / 16) * Math.PI * 2 + t * 0.01;
              ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(W * 0.78 + Math.cos(a) * 50, H * 0.35 + Math.sin(a) * 50);
              ctx.lineTo(W * 0.78 + Math.cos(a) * 90, H * 0.35 + Math.sin(a) * 90);
              ctx.stroke();
            }
            ctx.restore();
            break;
          }

          // ── 5: Sea creatures & birds ────────────────────────────────
          case 'creatures_sea': {
            // ocean background
            const oG = ctx.createLinearGradient(0, 0, 0, H);
            oG.addColorStop(0, '#87ceeb');
            oG.addColorStop(0.35, '#5daacf');
            oG.addColorStop(0.4, '#3d7aaf');
            oG.addColorStop(1, '#0a2a4c');
            ctx.fillStyle = oG;
            ctx.fillRect(0, 0, W, H);
            // water surface line
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let x = 0; x < W; x += 3) {
              const yy = H * 0.38 + Math.sin(x * 0.02 + t * 0.06) * 4;
              x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
            }
            ctx.stroke();
            // (light rays removed)
            // bubbles
            for (let i = 0; i < 12; i++) {
              const bx = (pr(i + 150) * W + Math.sin(t * 0.03 + i) * 15);
              const by = H - ((t * 0.4 + pr(i + 160) * H) % (H * 0.55));
              ctx.strokeStyle = `rgba(180,220,255,${0.15 + 0.1 * Math.sin(t * 0.06 + i)})`;
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.arc(bx, by + H * 0.4, 2 + pr(i + 170) * 4, 0, Math.PI * 2); ctx.stroke();
            }
            // emoji fish swimming at various depths
            const fishEmoji = ['\uD83D\uDC1F', '\uD83D\uDC20', '\uD83D\uDC21', '\uD83D\uDC1F', '\uD83D\uDC20', '\uD83D\uDC21', '\uD83D\uDC1F', '\uD83D\uDC20'];
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < fishEmoji.length; i++) {
              const speed = 0.4 + pr(i + 5) * 0.6;
              const fx = ((pr(i) * W + t * speed) % (W + 60)) - 30;
              const fy = H * 0.46 + pr(i + 20) * H * 0.3;
              const sz = 18 + pr(i + 30) * 16;
              const bob = Math.sin(t * 0.08 + i * 2.5) * 5;
              ctx.save();
              ctx.translate(fx, fy + bob);
              // flip fish facing right (moving right)
              ctx.scale(-1, 1);
              ctx.font = `${sz}px serif`;
              ctx.fillText(fishEmoji[i], 0, 0);
              ctx.restore();
            }
            // hand-drawn animated whale
            const wSpeed = 0.25;
            const wx = ((t * wSpeed) % (W + 300)) - 150;
            const wBob = Math.sin(t * 0.03) * 8;
            const wY = H * 0.70 + wBob;
            const wLen = Math.max(60, W * 0.1);  // whale body length
            const tailWag = Math.sin(t * 0.12) * 10; // tail wag animation
            const bodyWave = Math.sin(t * 0.06) * 3; // gentle body undulation
            ctx.save();
            ctx.translate(wx, wY);
            ctx.scale(-1, 1); // flip so whale faces direction of travel (right)
            // whale body (elongated oval)
            ctx.fillStyle = '#2a4a6a';
            ctx.beginPath();
            ctx.moveTo(-wLen * 0.5, 0);
            ctx.bezierCurveTo(-wLen * 0.5, -wLen * 0.35,
                              wLen * 0.3, -wLen * 0.38 + bodyWave,
                              wLen * 0.55, -wLen * 0.05 + bodyWave);
            ctx.bezierCurveTo(wLen * 0.3, wLen * 0.3 + bodyWave,
                              -wLen * 0.3, wLen * 0.3,
                              -wLen * 0.5, 0);
            ctx.fill();
            // lighter belly
            ctx.fillStyle = '#5a8aaa';
            ctx.beginPath();
            ctx.moveTo(-wLen * 0.4, wLen * 0.05);
            ctx.bezierCurveTo(-wLen * 0.2, wLen * 0.22,
                              wLen * 0.15, wLen * 0.22 + bodyWave,
                              wLen * 0.4, wLen * 0.02 + bodyWave);
            ctx.bezierCurveTo(wLen * 0.15, wLen * 0.15 + bodyWave,
                              -wLen * 0.2, wLen * 0.15,
                              -wLen * 0.4, wLen * 0.05);
            ctx.fill();
            // tail fluke (animated)
            ctx.fillStyle = '#2a4a6a';
            ctx.beginPath();
            ctx.moveTo(wLen * 0.5, -wLen * 0.05 + bodyWave);
            ctx.quadraticCurveTo(wLen * 0.65, -wLen * 0.05 + bodyWave,
                                 wLen * 0.8, -wLen * 0.25 + tailWag);
            ctx.quadraticCurveTo(wLen * 0.65, -wLen * 0.02 + bodyWave,
                                 wLen * 0.65, wLen * 0.02 + bodyWave);
            ctx.quadraticCurveTo(wLen * 0.65, wLen * 0.05 + bodyWave,
                                 wLen * 0.8, wLen * 0.2 - tailWag);
            ctx.quadraticCurveTo(wLen * 0.65, wLen * 0.05 + bodyWave,
                                 wLen * 0.5, wLen * 0.02 + bodyWave);
            ctx.fill();
            // eye
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-wLen * 0.28, -wLen * 0.08, wLen * 0.05, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(-wLen * 0.27, -wLen * 0.08, wLen * 0.025, 0, Math.PI * 2); ctx.fill();
            // mouth line
            ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-wLen * 0.48, wLen * 0.02);
            ctx.quadraticCurveTo(-wLen * 0.3, wLen * 0.08, -wLen * 0.15, wLen * 0.04);
            ctx.stroke();
            // dorsal fin
            ctx.fillStyle = '#2a4a6a';
            ctx.beginPath();
            ctx.moveTo(wLen * 0.05, -wLen * 0.28 + bodyWave);
            ctx.quadraticCurveTo(wLen * 0.15, -wLen * 0.45 + bodyWave, wLen * 0.25, -wLen * 0.26 + bodyWave);
            ctx.lineTo(wLen * 0.05, -wLen * 0.28 + bodyWave);
            ctx.fill();
            ctx.restore();
            // spout – periodic water spray above the whale's head
            const spoutCycle = (t * 0.02) % (Math.PI * 2);
            if (spoutCycle < Math.PI * 0.6) {
              const spoutAlpha = Math.sin(spoutCycle / 0.6);
              const spoutX = wx + wLen * 0.3;
              const spoutBaseY = wY - wLen * 0.35;
              ctx.save();
              ctx.globalAlpha = spoutAlpha * 0.7;
              ctx.strokeStyle = '#b0d8f0'; ctx.lineWidth = 2; ctx.lineCap = 'round';
              const spH = 25 * spoutAlpha;
              ctx.beginPath();
              ctx.moveTo(spoutX, spoutBaseY);
              ctx.quadraticCurveTo(spoutX - 8, spoutBaseY - spH * 0.6, spoutX - 12, spoutBaseY - spH);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(spoutX, spoutBaseY);
              ctx.quadraticCurveTo(spoutX + 8, spoutBaseY - spH * 0.6, spoutX + 12, spoutBaseY - spH);
              ctx.stroke();
              // droplets at the top
              ctx.fillStyle = '#b0d8f0';
              for (let d = 0; d < 5; d++) {
                const dx = spoutX + (d - 2) * 5;
                const dy = spoutBaseY - spH - 2 - Math.abs(d - 2) * 2;
                ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI * 2); ctx.fill();
              }
              ctx.restore();
            }
            // birds in the sky – simple flapping V-lines
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2; ctx.lineCap = 'round';
            for (let i = 0; i < 8; i++) {
              const bx = ((pr(i + 60) * W + t * (0.5 + pr(i + 70) * 0.8)) % (W + 60)) - 30;
              const byy = H * 0.06 + pr(i + 80) * H * 0.26;
              const wingSpan = 8 + pr(i + 90) * 6;
              const flap = Math.sin(t * 0.15 + i * 3) * wingSpan * 0.5;
              ctx.beginPath();
              ctx.moveTo(bx - wingSpan, byy - flap);
              ctx.quadraticCurveTo(bx - wingSpan * 0.3, byy + flap * 0.3, bx, byy);
              ctx.quadraticCurveTo(bx + wingSpan * 0.3, byy + flap * 0.3, bx + wingSpan, byy - flap);
              ctx.stroke();
            }
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
            break;
          }

          // ── 6: Land creatures ───────────────────────────────────────
          case 'creatures_land': {
            // sky + grass
            const sG = ctx.createLinearGradient(0, 0, 0, H * 0.55);
            sG.addColorStop(0, '#87ceeb');
            sG.addColorStop(1, '#b8e4f8');
            ctx.fillStyle = sG;
            ctx.fillRect(0, 0, W, H * 0.55);
            ctx.fillStyle = '#4e7c2b';
            ctx.fillRect(0, H * 0.55, W, H * 0.45);
            ctx.fillStyle = '#3d6a20';
            ctx.fillRect(0, H * 0.55, W, 4);
            // grass tufts
            ctx.strokeStyle = '#5a8a30';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 20; i++) {
              const gx = pr(i + 200) * W;
              const gy = H * 0.56 + pr(i + 210) * H * 0.06;
              for (let b = -1; b <= 1; b++) {
                ctx.beginPath();
                ctx.moveTo(gx + b * 3, gy);
                ctx.quadraticCurveTo(gx + b * 5 + Math.sin(t * 0.04 + i) * 2, gy - 8, gx + b * 4, gy - 12);
                ctx.stroke();
              }
            }
            // emoji animals walking across the land
            const landAnimals = [
              { emoji: '\uD83D\uDC04', ox: 0.10, oy: 0.63, sz: 32, spd: 0.20 },  // cow (full body)
              { emoji: '\uD83D\uDC2A', ox: 0.55, oy: 0.60, sz: 36, spd: 0.35 },  // camel (full body)
              { emoji: '\uD83D\uDC11', ox: 0.30, oy: 0.70, sz: 26, spd: 0.15 },  // sheep
              { emoji: '\uD83E\uDD8C', ox: 0.72, oy: 0.66, sz: 30, spd: 0.25 },  // deer
              { emoji: '\uD83D\uDC0E', ox: 0.45, oy: 0.62, sz: 34, spd: 0.40 },  // horse
              { emoji: '\uD83D\uDC18', ox: 0.85, oy: 0.64, sz: 38, spd: 0.12 },  // elephant
              { emoji: '\uD83D\uDC07', ox: 0.20, oy: 0.76, sz: 22, spd: 0.50 },  // rabbit
              { emoji: '\uD83E\uDD92', ox: 0.65, oy: 0.56, sz: 40, spd: 0.18 },  // giraffe
              { emoji: '\uD83D\uDC0D', ox: 0.40, oy: 0.80, sz: 20, spd: 0.10 },  // snake (creeping)
              { emoji: '\uD83E\uDD8E', ox: 0.78, oy: 0.82, sz: 18, spd: 0.08 },  // lizard (creeping)
            ];
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            landAnimals.forEach((an, i) => {
              const ax = ((an.ox * W + t * an.spd) % (W + 80)) - 40;
              const ay = an.oy * H;
              const bob = Math.sin(t * 0.1 + i * 2.1) * 3;
              ctx.save();
              ctx.translate(ax, ay + bob);
              ctx.scale(-1, 1); // face right
              ctx.font = `${an.sz}px serif`;
              ctx.fillText(an.emoji, 0, 0);
              ctx.restore();
            });
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
            break;
          }

          // ── 7: Man created ──────────────────────────────────────────
          case 'man': {
            // golden radiant background
            const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
            rg.addColorStop(0, '#fffbe0');
            rg.addColorStop(0.3, '#ffd700');
            rg.addColorStop(0.7, '#996600');
            rg.addColorStop(1, '#1a0a00');
            ctx.fillStyle = rg;
            ctx.fillRect(0, 0, W, H);
            // dust particles rising from below
            for (let i = 0; i < 40; i++) {
              const dx = cx + (pr(i) - 0.5) * W * 0.5;
              const dy = H - ((t * 0.6 + pr(i + 20) * 200) % (H * 0.8));
              const ds = 1 + pr(i + 40) * 3;
              ctx.fillStyle = `rgba(180,140,80,${0.15 + 0.1 * Math.sin(t * 0.06 + i)})`;
              ctx.beginPath(); ctx.arc(dx, dy, ds, 0, Math.PI * 2); ctx.fill();
            }
            // Adam with glory aura (actual character sprite)
            const figY = cy + H * 0.15;
            drawCutsceneChar(ctx, cx, figY, 3, {
              direction: 'down', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasGlory: true, gameTime: t,
            });
            break;
          }

          // ── 8: Provision ────────────────────────────────────────────
          case 'provision': {
            // lush garden scene
            const sG = ctx.createLinearGradient(0, 0, 0, H * 0.45);
            sG.addColorStop(0, '#6eb5e0');
            sG.addColorStop(1, '#a8daf0');
            ctx.fillStyle = sG;
            ctx.fillRect(0, 0, W, H * 0.45);
            // rolling green hills
            ctx.fillStyle = '#5a9a3a';
            ctx.beginPath();
            ctx.moveTo(0, H * 0.5);
            for (let x = 0; x <= W; x += 20) {
              ctx.lineTo(x, H * 0.44 + Math.sin(x * 0.008 + 1) * H * 0.04);
            }
            ctx.lineTo(W, H); ctx.lineTo(0, H);
            ctx.fill();
            ctx.fillStyle = '#4a8a2a';
            ctx.beginPath();
            ctx.moveTo(0, H * 0.55);
            for (let x = 0; x <= W; x += 20) {
              ctx.lineTo(x, H * 0.52 + Math.sin(x * 0.006 + 3) * H * 0.03);
            }
            ctx.lineTo(W, H); ctx.lineTo(0, H);
            ctx.fill();
            // helper: sample the front hill curve at any X
            const hillY = (px) => H * 0.44 + Math.sin(px * 0.008 + 1) * H * 0.04;
            // fruit trees – emoji trees sitting on the hill curve
            const fruitTrees = ['🌳', '🌴', '🌲', '🌳', '🌴', '🌳'];
            for (let i = 0; i < 6; i++) {
              const tx = W * 0.1 + i * W * 0.15;
              const ty = hillY(tx);            // tree base on the curve
              ctx.font = '36px serif';
              ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
              ctx.fillText(fruitTrees[i], tx, ty + 5);
            }
            ctx.textAlign = 'left';
            // herbs / grain at bottom
            ctx.strokeStyle = '#3a6a10';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 30; i++) {
              const gx = pr(i + 90) * W;
              const gy = H * 0.75 + pr(i + 91) * H * 0.2;
              const gh = 8 + pr(i + 92) * 14;
              ctx.beginPath();
              ctx.moveTo(gx, gy);
              ctx.quadraticCurveTo(gx + Math.sin(t * 0.05 + i) * 4, gy - gh * 0.6, gx + Math.sin(t * 0.05 + i) * 3, gy - gh);
              ctx.stroke();
            }
            break;
          }

          // ── 9: Seventh Day – Rest ───────────────────────────────────
          case 'rest': {
            // peaceful golden twilight
            const rG = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy * 0.7, Math.max(W, H) * 0.8);
            rG.addColorStop(0, '#fff8e0');
            rG.addColorStop(0.3, '#ffe4a0');
            rG.addColorStop(0.6, '#cc8844');
            rG.addColorStop(1, '#221100');
            ctx.fillStyle = rG;
            ctx.fillRect(0, 0, W, H);
            // soft pulsing light
            ctx.save();
            const pulse = 0.08 + 0.04 * Math.sin(t * 0.04);
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cx, cy * 0.7, 120 + Math.sin(t * 0.03) * 20, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // gentle drifting motes
            for (let i = 0; i < 25; i++) {
              const mx = cx + Math.sin(t * 0.01 + i * 1.3) * W * 0.4;
              const my = cy + Math.cos(t * 0.008 + i * 0.9) * H * 0.35;
              ctx.fillStyle = `rgba(255,240,180,${0.1 + 0.08 * Math.sin(t * 0.05 + i)})`;
              ctx.beginPath(); ctx.arc(mx, my, 2 + pr(i) * 3, 0, Math.PI * 2); ctx.fill();
            }
            break;
          }

          // ── 10: The Generations (2:4-6) ─────────────────────
          case 'generations': {
            // Barren earth with mist rising
            const skyG2 = ctx.createLinearGradient(0, 0, 0, H * 0.45);
            skyG2.addColorStop(0, '#8a7a6a');
            skyG2.addColorStop(1, '#b0a090');
            ctx.fillStyle = skyG2;
            ctx.fillRect(0, 0, W, H * 0.45);
            const gndG = ctx.createLinearGradient(0, H * 0.45, 0, H);
            gndG.addColorStop(0, '#8b7355');
            gndG.addColorStop(1, '#6b5335');
            ctx.fillStyle = gndG;
            ctx.fillRect(0, H * 0.45, W, H * 0.55);
            // cracks in dry ground
            ctx.strokeStyle = '#5a4025'; ctx.lineWidth = 1;
            for (let i = 0; i < 20; i++) {
              const sx = pr(i + 200) * W;
              const sy = H * 0.5 + pr(i + 201) * H * 0.4;
              ctx.beginPath(); ctx.moveTo(sx, sy);
              ctx.lineTo(sx + (pr(i + 202) - 0.5) * 60, sy + pr(i + 203) * 30);
              ctx.stroke();
            }
            // rising mist
            for (let i = 0; i < 8; i++) {
              const mx = pr(i + 210) * W;
              const my = H * 0.35 + Math.sin(t * 0.015 + i * 1.2) * 30;
              const mw = 80 + pr(i + 211) * 120;
              const mh = 20 + pr(i + 212) * 15;
              const alpha = 0.08 + 0.06 * Math.sin(t * 0.02 + i * 0.7);
              ctx.fillStyle = `rgba(200,210,220,${alpha})`;
              ctx.beginPath(); ctx.ellipse(mx, my, mw, mh, 0, 0, Math.PI * 2); ctx.fill();
            }
            // mist columns from ground
            for (let i = 0; i < 5; i++) {
              const bx = W * 0.1 + i * W * 0.2;
              const rise = Math.sin(t * 0.01 + i * 1.5) * 20;
              const mG = ctx.createLinearGradient(bx, H * 0.45, bx, H * 0.2 + rise);
              mG.addColorStop(0, 'rgba(180,190,200,0.15)');
              mG.addColorStop(1, 'rgba(180,190,200,0)');
              ctx.fillStyle = mG;
              ctx.fillRect(bx - 30, H * 0.2 + rise, 60, H * 0.25 - rise);
            }
            break;
          }

          // ── 12: Rivers of Eden (2:10-14) ──────────────────────
          case 'rivers': {
            const rsG = ctx.createLinearGradient(0, 0, 0, H * 0.35);
            rsG.addColorStop(0, '#4a8ac7');
            rsG.addColorStop(1, '#87ceeb');
            ctx.fillStyle = rsG;
            ctx.fillRect(0, 0, W, H * 0.35);
            ctx.fillStyle = '#2d6b1e';
            ctx.fillRect(0, H * 0.35, W, H * 0.65);
            // main river
            ctx.strokeStyle = '#2277bb'; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(cx, H * 0.35); ctx.lineTo(cx, H * 0.55); ctx.stroke();
            // four branches
            const rvData = [
              { name: 'PIYSHON', endX: W * 0.05, endY: H * 0.9 },
              { name: 'GIYCHON', endX: W * 0.35, endY: H * 0.95 },
              { name: 'CHIDDEQEL', endX: W * 0.65, endY: H * 0.95 },
              { name: 'PERATH', endX: W * 0.95, endY: H * 0.9 },
            ];
            rvData.forEach((rv, i) => {
              ctx.strokeStyle = i % 2 === 0 ? '#2277bb' : '#2288cc';
              ctx.lineWidth = 5;
              ctx.beginPath(); ctx.moveTo(cx, H * 0.55);
              ctx.quadraticCurveTo(cx + (rv.endX - cx) * 0.3, H * 0.65, rv.endX, rv.endY);
              ctx.stroke();
              const shimX = cx + (rv.endX - cx) * 0.6;
              const shimY = H * 0.65 + (rv.endY - H * 0.65) * 0.4;
              ctx.fillStyle = `rgba(150,220,255,${0.3 + 0.15 * Math.sin(t * 0.03 + i)})`;
              ctx.beginPath(); ctx.arc(shimX, shimY, 3, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
              ctx.fillText(rv.name, rv.endX * 0.7 + cx * 0.3, rv.endY - 15);
            });
            ctx.textAlign = 'left';
            // gold sparkles
            for (let i = 0; i < 8; i++) {
              const gx = W * 0.05 + pr(i + 310) * W * 0.15;
              const gy = H * 0.75 + pr(i + 311) * H * 0.15;
              ctx.fillStyle = `rgba(255,215,0,${0.4 + 0.4 * Math.sin(t * 0.05 + i * 1.1)})`;
              ctx.beginPath(); ctx.arc(gx, gy, 2 + pr(i + 312) * 2, 0, Math.PI * 2); ctx.fill();
            }
            break;
          }

          // ── 13: The Command (2:15-17) ───────────────────────
          case 'command': {
            const csG = ctx.createLinearGradient(0, 0, 0, H * 0.3);
            csG.addColorStop(0, '#ffd700');
            csG.addColorStop(1, '#87ceeb');
            ctx.fillStyle = csG;
            ctx.fillRect(0, 0, W, H * 0.35);
            ctx.fillStyle = '#2d7a1e';
            ctx.fillRect(0, H * 0.35, W, H * 0.65);
            // divine light beam
            const beamG = ctx.createLinearGradient(cx, 0, cx, H * 0.5);
            beamG.addColorStop(0, 'rgba(255,255,200,0.3)');
            beamG.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = beamG;
            ctx.beginPath();
            ctx.moveTo(cx - 80, 0); ctx.lineTo(cx - 30, H * 0.5);
            ctx.lineTo(cx + 30, H * 0.5); ctx.lineTo(cx + 80, 0);
            ctx.fill();
            // Tree of Knowledge center
            ctx.fillStyle = '#3a2510';
            ctx.fillRect(cx - 8, H * 0.2, 16, H * 0.2);
            ctx.fillStyle = '#1a3a1a';
            ctx.beginPath(); ctx.arc(cx, H * 0.15, 45, 0, Math.PI * 2); ctx.fill();
            for (let i = 0; i < 8; i++) {
              const a = (i / 8) * Math.PI * 2 + t * 0.005;
              ctx.fillStyle = '#cc0000';
              ctx.beginPath();
              ctx.arc(cx + Math.cos(a) * 28, H * 0.15 + Math.sin(a) * 24, 5, 0, Math.PI * 2);
              ctx.fill();
            }
            // warning glow
            ctx.strokeStyle = `rgba(255,0,0,${0.1 + 0.08 * Math.sin(t * 0.04)})`;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(cx, H * 0.2, 60, 0, Math.PI * 2); ctx.stroke();
            // Adam sprite (actual character)
            drawCutsceneChar(ctx, cx + W * 0.25, H * 0.48, 2.5, {
              direction: 'left', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasGlory: true, gameTime: t,
            });
            break;
          }

          // ── 14: The Naming (2:18-20) ────────────────────────
          case 'naming': {
            const nsG = ctx.createLinearGradient(0, 0, 0, H * 0.4);
            nsG.addColorStop(0, '#e8a050');
            nsG.addColorStop(1, '#87ceeb');
            ctx.fillStyle = nsG;
            ctx.fillRect(0, 0, W, H * 0.4);
            ctx.fillStyle = '#3a7a22';
            ctx.fillRect(0, H * 0.4, W, H * 0.6);
            // Adam sprite in center (actual character)
            drawCutsceneChar(ctx, cx, H * 0.48, 2.5, {
              direction: 'down', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasGlory: true, gameTime: t,
            });
            // animals in semicircle
            const animalEmojis = ['🐄','🐂','🐑','🦌','🐦','🦅','🐇','🐎'];
            const animalAngles = [-2.5, -1.8, -1.1, -0.4, 0.4, 1.1, 1.8, 2.5];
            for (let i = 0; i < 8; i++) {
              const dist = 90 + Math.sin(t * 0.02 + i) * 8;
              const ax = cx + Math.cos(animalAngles[i]) * dist;
              const ay = H * 0.5 + Math.sin(animalAngles[i]) * dist * 0.4 + 20;
              ctx.font = '26px serif'; ctx.textAlign = 'center';
              ctx.fillText(animalEmojis[i], ax, ay);
            }
            ctx.textAlign = 'left';
            // birds in sky
            for (let i = 0; i < 5; i++) {
              const bx = pr(i + 350) * W;
              const by = H * 0.1 + pr(i + 351) * H * 0.2 + Math.sin(t * 0.02 + i * 2) * 10;
              ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.moveTo(bx - 8, by + 3); ctx.quadraticCurveTo(bx - 4, by - 3, bx, by);
              ctx.quadraticCurveTo(bx + 4, by - 3, bx + 8, by + 3);
              ctx.stroke();
            }
            break;
          }

          // ── 15: The Woman (2:21-25) ─────────────────────────
          case 'woman': {
            const wsG = ctx.createLinearGradient(0, 0, 0, H * 0.4);
            wsG.addColorStop(0, '#0a0a2e');
            wsG.addColorStop(1, '#1a1a4e');
            ctx.fillStyle = wsG;
            ctx.fillRect(0, 0, W, H * 0.4);
            // stars
            for (let i = 0; i < 40; i++) {
              const sx = pr(i + 400) * W;
              const sy = pr(i + 401) * H * 0.35;
              const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(t * 0.03 + i * 0.8));
              ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
              ctx.beginPath(); ctx.arc(sx, sy, 1 + pr(i + 402), 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = '#1a4a12';
            ctx.fillRect(0, H * 0.4, W, H * 0.6);
            // Sleeping Adam (lying down, approximated by side sprite)
            ctx.save();
            ctx.translate(cx - W * 0.2, H * 0.52);
            ctx.rotate(Math.PI / 2); // rotate to look like lying down
            ctx.scale(2.5, 2.5);
            drawCharacterSprite(ctx, 0, 0, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasGlory: true, gameTime: t,
            });
            ctx.restore();
            // Divine sleep glow
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20 + Math.sin(t * 0.05) * 10;
            ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(cx - W * 0.2, H * 0.52, 45, 22, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0;
            // Z's
            for (let i = 0; i < 3; i++) {
              const zx = cx - W * 0.2 - 10 + i * 12;
              const zy = H * 0.42 - i * 15 + Math.sin(t * 0.03 + i) * 5;
              ctx.fillStyle = `rgba(200,200,255,${0.4 + i * 0.15})`;
              ctx.font = `${12 + i * 4}px sans-serif`; ctx.textAlign = 'center';
              ctx.fillText('z', zx, zy);
            }
            // Chavvah in divine light (actual character sprite)
            const wAlpha = 0.5 + 0.5 * Math.sin(t * 0.02);
            const wGlow = ctx.createRadialGradient(cx + W * 0.2, H * 0.44, 5, cx + W * 0.2, H * 0.44, 50);
            wGlow.addColorStop(0, `rgba(255,255,220,${wAlpha * 0.5})`);
            wGlow.addColorStop(1, 'rgba(255,255,220,0)');
            ctx.fillStyle = wGlow;
            ctx.fillRect(cx + W * 0.2 - 50, H * 0.34, 100, 80);
            drawCutsceneChar(ctx, cx + W * 0.2, H * 0.56, 2.5, {
              direction: 'down', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasGlory: true, gameTime: t,
            });
            ctx.textAlign = 'left';
            break;
          }

          // ── 10: Garden of Eden ──────────────────────────────────────
          case 'garden': {
            // rich sky
            const sG = ctx.createLinearGradient(0, 0, 0, H * 0.4);
            sG.addColorStop(0, '#5a9ae0');
            sG.addColorStop(1, '#87ceeb');
            ctx.fillStyle = sG;
            ctx.fillRect(0, 0, W, H * 0.4);
            // lush ground
            ctx.fillStyle = '#3a7a22';
            ctx.fillRect(0, H * 0.4, W, H * 0.6);
            // garden path down the middle
            ctx.fillStyle = '#c9a86c';
            ctx.fillRect(cx - 20, H * 0.4, 40, H * 0.6);
            // Tree of Life (right, golden)
            const tolX = cx + W * 0.25;
            ctx.fillStyle = '#654321';
            ctx.fillRect(tolX - 6, H * 0.2, 12, H * 0.25);
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 25 + Math.sin(t * 0.1) * 8;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(tolX, H * 0.15, 35, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,200,0.4)';
            ctx.beginPath(); ctx.arc(tolX, H * 0.15, 25, 0, Math.PI * 2); ctx.fill();
            // Tree of Knowledge (left, dark with red fruit)
            const tokX = cx - W * 0.25;
            ctx.fillStyle = '#4a3520';
            ctx.fillRect(tokX - 6, H * 0.2, 12, H * 0.25);
            ctx.fillStyle = '#1a3a1a';
            ctx.beginPath(); ctx.arc(tokX, H * 0.15, 35, 0, Math.PI * 2); ctx.fill();
            // red fruits
            for (let i = 0; i < 6; i++) {
              const a = (i / 6) * Math.PI * 2 + 0.3;
              ctx.fillStyle = '#cc0000';
              ctx.beginPath(); ctx.arc(tokX + Math.cos(a) * 20, H * 0.15 + Math.sin(a) * 18, 5, 0, Math.PI * 2); ctx.fill();
            }
            // decorative emoji trees lining the garden
            const gardenTrees = ['🌳', '🌲', '🌳', '🌴', '🌲', '🌳', '🌲', '🌳', '🌴', '🌳'];
            for (let i = 0; i < 10; i++) {
              const tx = i * (W / 10) + W * 0.05;
              if (Math.abs(tx - cx) < 40 || Math.abs(tx - tolX) < 50 || Math.abs(tx - tokX) < 50) continue;
              ctx.font = '28px serif';
              ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
              ctx.fillText(gardenTrees[i], tx, H * 0.44);
            }
            ctx.textAlign = 'left';
            // flowers
            for (let i = 0; i < 15; i++) {
              const fx = pr(i + 120) * W;
              const fy = H * 0.5 + pr(i + 130) * H * 0.35;
              if (Math.abs(fx - cx) < 25) continue;
              ctx.fillStyle = i % 3 === 0 ? '#ff69b4' : i % 3 === 1 ? '#ffd700' : '#ff4444';
              ctx.beginPath(); ctx.arc(fx, fy, 3 + pr(i + 140) * 2, 0, Math.PI * 2); ctx.fill();
            }
            // Adam sprite on the garden path
            drawCutsceneChar(ctx, cx, H * 0.55, 2, {
              direction: 'down', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasGlory: true, gameTime: t,
            });
            // golden gate in the distance (top right)
            ctx.fillStyle = '#daa520';
            ctx.fillRect(W * 0.88, H * 0.3, 5, H * 0.15);
            ctx.fillRect(W * 0.93, H * 0.3, 5, H * 0.15);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(W * 0.905, H * 0.31, 13, Math.PI, 0); ctx.stroke();
            break;
          }

          default: {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
          }
        }
      };

      // ── Chapter 3 cutscene scene renderer ──────────────────────────────
      const drawChapter3Scene = (ctx, W, H, slide, t) => {
        const scene = CHAPTER3_SLIDES[slide]?.scene || 'garden_voice';
        const cx = W / 2, cy = H / 2;
        const pr = (i) => ((Math.sin(i * 127.1 + i * 311.7) * 43758.5453) % 1 + 1) % 1;
        const charScale = Math.max(2, Math.min(3.5, H / 250));

        // Common dark garden background
        const drawDarkGarden = () => {
          const sG = ctx.createLinearGradient(0, 0, 0, H);
          sG.addColorStop(0, '#1a2a1a');
          sG.addColorStop(0.5, '#0a1a0a');
          sG.addColorStop(1, '#0a0a05');
          ctx.fillStyle = sG;
          ctx.fillRect(0, 0, W, H);
          // Ground
          ctx.fillStyle = '#1a3a12';
          ctx.fillRect(0, H * 0.65, W, H * 0.35);
          // Trees silhouettes
          for (let i = 0; i < 10; i++) {
            const tx = pr(i + 500) * W;
            const th = 60 + pr(i + 501) * 50;
            ctx.fillStyle = `rgba(10,30,10,${0.5 + pr(i + 502) * 0.3})`;
            ctx.fillRect(tx - 4, H * 0.5, 8, H * 0.16);
            ctx.beginPath(); ctx.arc(tx, H * 0.5 - th * 0.1, th * 0.3, 0, Math.PI * 2); ctx.fill();
          }
        };

        switch (scene) {
          case 'garden_voice': {
            // The express image of YAHUAH walks in the garden; Adam and Chavvah hide
            drawDarkGarden();
            // Divine presence walking through (the express image)
            const walkX = cx + Math.sin(t * 0.012) * W * 0.15;
            drawDivinePresence(ctx, walkX, H * 0.58, charScale * 0.6, t);
            // Two specific trees for hiding (left and right)
            // Left tree (Adam hides behind)
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(W * 0.15 - 5, H * 0.45, 10, H * 0.22);
            ctx.fillStyle = '#0a2a0a';
            ctx.beginPath(); ctx.arc(W * 0.15, H * 0.4, 35, 0, Math.PI * 2); ctx.fill();
            // Right tree (Chavvah hides behind)
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(W * 0.82 - 5, H * 0.45, 10, H * 0.22);
            ctx.fillStyle = '#0a2a0a';
            ctx.beginPath(); ctx.arc(W * 0.82, H * 0.4, 35, 0, Math.PI * 2); ctx.fill();
            // Adam peeking from behind left tree (partially hidden)
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, W * 0.15 + 12, H);
            ctx.clip();
            drawCutsceneChar(ctx, W * 0.15 + 18, H * 0.68, charScale * 0.7, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            ctx.restore();
            // Chavvah peeking from behind right tree (partially hidden)
            ctx.save();
            ctx.beginPath();
            ctx.rect(W * 0.82 - 12, 0, W, H);
            ctx.clip();
            drawCutsceneChar(ctx, W * 0.82 - 18, H * 0.68, charScale * 0.7, {
              direction: 'left', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            ctx.restore();
            break;
          }
          case 'where_are_you': {
            // Divine presence calls to Adam and Chavvah who emerge from hiding
            drawDarkGarden();
            // Beam of light from the divine presence
            const beamG = ctx.createLinearGradient(cx, 0, cx, H * 0.7);
            beamG.addColorStop(0, 'rgba(255,255,200,0.2)');
            beamG.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = beamG;
            ctx.beginPath();
            ctx.moveTo(cx - 80, 0); ctx.lineTo(cx - 30, H * 0.7);
            ctx.lineTo(cx + 30, H * 0.7); ctx.lineTo(cx + 80, 0);
            ctx.fill();
            // Divine presence at top center
            drawDivinePresence(ctx, cx, H * 0.35, charScale * 0.5, t);
            // "WHERE ARE YOU?" text
            ctx.fillStyle = 'rgba(255,215,0,0.12)';
            ctx.font = `bold ${Math.max(16, W * 0.035)}px Georgia, serif`;
            ctx.textAlign = 'center';
            ctx.fillText('WHERE ARE YOU?', cx, H * 0.2);
            ctx.textAlign = 'left';
            // Adam emerging, looking afraid (facing up toward divine presence)
            drawCutsceneChar(ctx, cx - W * 0.08, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Chavvah beside Adam
            drawCutsceneChar(ctx, cx + W * 0.08, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            break;
          }
          case 'who_told_you': {
            // All three stand before the divine presence
            drawDarkGarden();
            // Divine presence above
            drawDivinePresence(ctx, cx, H * 0.3, charScale * 0.5, t);
            // Light beam
            const beamG = ctx.createLinearGradient(cx, 0, cx, H * 0.5);
            beamG.addColorStop(0, 'rgba(255,255,200,0.15)');
            beamG.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = beamG;
            ctx.beginPath();
            ctx.moveTo(cx - 100, 0); ctx.lineTo(cx - 40, H * 0.5);
            ctx.lineTo(cx + 40, H * 0.5); ctx.lineTo(cx + 100, 0);
            ctx.fill();
            // Adam (left, facing divine presence)
            drawCutsceneChar(ctx, cx - W * 0.18, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Chavvah (center, facing divine presence)
            drawCutsceneChar(ctx, cx, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Nachash (right, upright serpent)
            drawCutsceneSerpent(ctx, cx + W * 0.18, H * 0.78, charScale * 0.8, t);
            break;
          }
          case 'curse_serpent': {
            // Serpent being cursed - falls to its belly
            drawDarkGarden();
            // Red ominous glow
            const rG = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.5);
            rG.addColorStop(0, 'rgba(150,0,0,0.12)');
            rG.addColorStop(1, 'rgba(50,0,0,0)');
            ctx.fillStyle = rG;
            ctx.fillRect(0, 0, W, H);
            // Divine presence above
            drawDivinePresence(ctx, cx, H * 0.28, charScale * 0.45, t);
            // Adam and Chavvah standing to the side (left, watching)
            drawCutsceneChar(ctx, W * 0.12, H * 0.75, charScale * 0.65, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            drawCutsceneChar(ctx, W * 0.22, H * 0.75, charScale * 0.65, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Serpent on its belly (cursed form - snake slithering on ground)
            ctx.strokeStyle = '#228b22'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx - 60, H * 0.72);

            }

            // Snake head
            ctx.fillStyle = '#228b22';
            ctx.beginPath(); ctx.arc(cx + 80, H * 0.72, 7, 0, Math.PI * 2); ctx.fill();

            // Dust around serpent

          }
          case 'unto_woman': {
            // Chavvah receives her judgment
            drawDarkGarden();
            // Divine presence above
            drawDivinePresence(ctx, cx, H * 0.3, charScale * 0.45, t);
            // Dim light
            ctx.fillStyle = 'rgba(255,255,200,0.03)';
            ctx.beginPath();
            ctx.moveTo(cx - 50, 0); ctx.lineTo(cx - 20, H); ctx.lineTo(cx + 20, H); ctx.lineTo(cx + 50, 0);
            ctx.fill();
            // Adam standing to the side (left)
            drawCutsceneChar(ctx, W * 0.15, H * 0.75, charScale * 0.65, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
