            });
            // Chavvah in center, facing divine presence
            drawCutsceneChar(ctx, cx, H * 0.78, charScale * 0.85, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Tears falling
            for (let i = 0; i < 4; i++) {
              const tearY = H * 0.64 + ((t * 0.5 + i * 8) % 20);
              ctx.fillStyle = `rgba(100,150,255,${0.5 - (tearY - H * 0.64) * 0.015})`;
              ctx.beginPath(); ctx.arc(cx + 8 + i * 4, tearY, 1.5, 0, Math.PI * 2); ctx.fill();
            }
            break;
          }
          case 'unto_adam': {
            // Adam receives his judgment - harsh ground scene
            const aG = ctx.createLinearGradient(0, 0, 0, H);
            aG.addColorStop(0, '#2a1a0a');
            aG.addColorStop(0.5, '#1a1005');
            aG.addColorStop(1, '#0a0500');
            ctx.fillStyle = aG;
            ctx.fillRect(0, 0, W, H);
            // Cracked barren ground
            ctx.fillStyle = '#4a3a2a';
            ctx.fillRect(0, H * 0.6, W, H * 0.4);
            ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 1;
            for (let i = 0; i < 15; i++) {
              const sx = pr(i + 700) * W;
              const sy = H * 0.65 + pr(i + 701) * H * 0.3;
              ctx.beginPath(); ctx.moveTo(sx, sy);
              ctx.lineTo(sx + (pr(i + 702) - 0.5) * 50, sy + pr(i + 703) * 20);
              ctx.stroke();
            }
            // Thorns
            ctx.strokeStyle = '#5a4a30'; ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
              const tx = W * 0.1 + i * W * 0.1;
              const ty = H * 0.58;
              ctx.beginPath(); ctx.moveTo(tx, ty + 10);
              ctx.lineTo(tx - 5, ty); ctx.moveTo(tx, ty + 10);
              ctx.lineTo(tx + 5, ty); ctx.moveTo(tx, ty + 5);
              ctx.lineTo(tx - 8, ty - 3); ctx.moveTo(tx, ty + 5);
              ctx.lineTo(tx + 8, ty - 3);
              ctx.stroke();
            }
            // Divine presence above
            drawDivinePresence(ctx, cx, H * 0.28, charScale * 0.45, t);
            // Adam in center facing divine presence
            drawCutsceneChar(ctx, cx, H * 0.76, charScale * 0.85, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Chavvah to the right
            drawCutsceneChar(ctx, cx + W * 0.15, H * 0.76, charScale * 0.65, {
              direction: 'left', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Sweat drops around Adam
            for (let i = 0; i < 4; i++) {
              const sy = H * 0.62 + ((t * 0.3 + i * 6) % 15);
              ctx.fillStyle = `rgba(150,200,255,${0.4 - (sy - H * 0.62) * 0.02})`;
              ctx.beginPath(); ctx.arc(cx - 10 + i * 5, sy, 1.2, 0, Math.PI * 2); ctx.fill();
            }
            break;
          }
          case 'naming_clothing': {
            // YAHUAH clothes them with coats of skins
            drawDarkGarden();
            // Warm divine light from above
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 25 + Math.sin(t * 0.05) * 8;
            ctx.fillStyle = 'rgba(255,215,0,0.1)';
            ctx.beginPath(); ctx.arc(cx, H * 0.2, 80, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            // Divine presence providing clothing
            drawDivinePresence(ctx, cx, H * 0.35, charScale * 0.45, t);
            // Adam with clothes (left)
            drawCutsceneChar(ctx, cx - W * 0.12, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, hasClothes: true, showClothes: true, gameTime: t,
            });
            // Chavvah with clothes (right)
            drawCutsceneChar(ctx, cx + W * 0.12, H * 0.78, charScale * 0.8, {
              direction: 'up', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, hasClothes: true, showClothes: true, gameTime: t,
            });
            break;
          }
          case 'expulsion': {
            // Dramatic expulsion scene
            const eG = ctx.createLinearGradient(0, 0, W, 0);
            eG.addColorStop(0, '#1a3a1a');
            eG.addColorStop(0.4, '#0a2a0a');
            eG.addColorStop(0.5, '#3a2a1a');
            eG.addColorStop(0.6, '#4a3a2a');
            eG.addColorStop(1, '#6a5a3a');
            ctx.fillStyle = eG;
            ctx.fillRect(0, 0, W, H);
            // Ground
            ctx.fillStyle = '#3a2a18';
            ctx.fillRect(0, H * 0.7, W, H * 0.3);
            // Golden gate in center
            ctx.fillStyle = '#daa520';
            ctx.fillRect(cx - 10, H * 0.15, 6, H * 0.55);
            ctx.fillRect(cx + 4, H * 0.15, 6, H * 0.55);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(cx, H * 0.17, 12, Math.PI, 0); ctx.stroke();
            // Flaming sword
            const swordGlow = Math.sin(t * 0.15) * 0.3;
            ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 15 + swordGlow * 10;
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(cx, H * 0.08);
            ctx.lineTo(cx - 5, H * 0.3);
            ctx.lineTo(cx + 5, H * 0.3);
            ctx.closePath(); ctx.fill();
            for (let i = 0; i < 6; i++) {
              const fx = cx + Math.sin(t * 0.2 + i * 1.5) * 6;
              const fy = H * 0.1 + i * (H * 0.03);
              ctx.fillStyle = `rgba(255,${100 + i * 20},0,${0.5 - i * 0.06})`;
              ctx.beginPath(); ctx.arc(fx, fy, 4 - i * 0.3, 0, Math.PI * 2); ctx.fill();
            }
            ctx.shadowBlur = 0;
            // Keruviym (angel sprites) flanking the gate
            drawCutsceneChar(ctx, cx - 35, H * 0.55, charScale * 0.5, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#ffffff',
              skinColor: SKIN_COLOR, gameTime: t,
            });
            drawCutsceneChar(ctx, cx + 35, H * 0.55, charScale * 0.5, {
              direction: 'left', hairColor: '#1a1a1a', bodyColor: '#ffffff',
              skinColor: SKIN_COLOR, gameTime: t,
            });
            // Adam and Chavvah walking away to the right (animated position)
            const walkOff = (t * 0.3) % (W * 0.3);
            drawCutsceneChar(ctx, cx + 65 + walkOff, H * 0.82, charScale * 0.7, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#6b8c42',
              skinColor: SKIN_COLOR, isMoving: true, walkFrame: (t * 0.15) % 4,
              hasClothes: true, showClothes: true, gameTime: t,
            });
            drawCutsceneChar(ctx, cx + 85 + walkOff, H * 0.82, charScale * 0.65, {
              direction: 'right', hairColor: '#1a1a1a', bodyColor: '#c07080',
              skinColor: SKIN_COLOR, isEve: true, isMoving: true, walkFrame: (t * 0.15 + 1) % 4,
              hasClothes: true, showClothes: true, gameTime: t,
            });
            break;
          }
          default: {
            ctx.fillStyle = '#0a0a00';
            ctx.fillRect(0, 0, W, H);
          }
        }
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        // Account for device pixel ratio so canvas text and graphics are
        // crisp on Retina / high-DPI screens.  All coordinates below stay
        // in CSS pixels; only the bitmap is larger.
        const dpr = window.devicePixelRatio || 1;
        const W = canvas.clientWidth  || window.innerWidth;
        const H = canvas.clientHeight || window.innerHeight;
        if (canvas.width  !== Math.round(W * dpr)) canvas.width  = Math.round(W * dpr);
        if (canvas.height !== Math.round(H * dpr)) canvas.height = Math.round(H * dpr);
        const vp = { w: Math.ceil(W / TILE_SIZE) + 2, h: Math.ceil(H / TILE_SIZE) + 2 };
        const ctx = canvas.getContext('2d');
        // Reset transform then apply DPR scale so every draw call uses CSS px.
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        // ── CUTSCENE rendering ──────────────────────────────────────────
        if (gamePhase === PHASES.CUTSCENE) {
          drawCutscene(ctx, W, H, cutsceneSlide, gameTime);
          return; // don't draw the map during the cutscene
        }
        // ── CHAPTER 3 CUTSCENE rendering ─────────────────────────────────
        if (gamePhase === PHASES.CHAPTER3_CUTSCENE) {
          drawChapter3Scene(ctx, W, H, chapter3Slide, gameTime);
          return;
        }

        ctx.fillStyle = COLORS.sky;
        ctx.fillRect(0, 0, W, H);

        // ── PASS 1: Ground layer (flat tiles) ─────────────────────────────
        const tallObjects = [];
        for (let y = 0; y < vp.h + 1; y++) {
          for (let x = 0; x < vp.w + 1; x++) {
            const mapX = Math.floor(camera.x) + x, mapY = Math.floor(camera.y) + y;
            if (mapX >= 0 && mapX < MAP_WIDTH && mapY >= 0 && mapY < MAP_HEIGHT) {
              const tile = map[mapY][mapX];
              const screenX = (x - (camera.x % 1)) * TILE_SIZE, screenY = (y - (camera.y % 1)) * TILE_SIZE;

              // ── Natural grass base ─────────────────
              const gh = ((mapX * 1234567 + mapY * 891011) >>> 0) % 100;
              const grassBases = ['#4e7c2b', '#527f2e', '#4a7828', '#568231', '#4c7a2c'];
              ctx.fillStyle = grassBases[gh % 5];
              ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);

              // Grass details only where grass is visible (skip water/path)
              if (tile !== TILES.WATER && tile !== TILES.PATH && tile !== TILES.GOLDEN_GATE) {
                if (gh < 18) {
                  ctx.fillStyle = 'rgba(90,62,28,0.18)';
                  ctx.fillRect(screenX + (gh * 5) % 44, screenY + (gh * 7) % 44, 14, 12);
                }
                ctx.fillStyle = '#3a6020';
                for (let bi = 0; bi < 5; bi++) {
                  ctx.fillRect(screenX + (gh*(bi+1)*13+mapX)%58+2, screenY + (gh*(bi+1)*7+mapY)%56+2, 2, 5);
                }
                ctx.fillStyle = '#6aaa3e';
                for (let bi = 0; bi < 3; bi++) {
                  ctx.fillRect(screenX + (gh*(bi+4)*17)%58+2, screenY + (gh*(bi+4)*11)%56+2, 2, 3);
                }
              }

              switch (tile) {
                case TILES.WATER:
                  ctx.fillStyle = (gameTime + mapX + mapY) % 20 < 10 ? COLORS.water : COLORS.waterLight;
                  ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                  ctx.fillStyle = 'rgba(255,255,255,0.12)';
                  ctx.fillRect(screenX + ((gameTime + mapX*3)%48)+4, screenY + ((gameTime*2+mapY*5)%48)+4, 18, 4);
                  break;
                case TILES.FLOWER:
                  ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
                  ctx.fillStyle = mapX % 2 === 0 ? COLORS.flower : COLORS.flowerYellow;
                  ctx.beginPath(); ctx.arc(16, 18, 5, 0, Math.PI * 2); ctx.fill();
                  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(16, 18, 2, 0, Math.PI * 2); ctx.fill();
                  ctx.restore();
                  break;
                case TILES.PATH: {
                  const ph = ((mapX * 2345 + mapY * 6789) >>> 0) % 100;
                  ctx.fillStyle = '#9b7d52';
                  ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                  ctx.fillStyle = '#7a6040';
                  for (let pi = 0; pi < 4; pi++) ctx.fillRect(screenX + (ph*(pi+1)*11)%56+4, screenY + (ph*(pi+1)*7)%56+4, 5, 3);
                  ctx.fillStyle = '#c0a070';
                  for (let pi = 0; pi < 3; pi++) ctx.fillRect(screenX + (ph*(pi+4)*17)%56+4, screenY + (ph*(pi+4)*13)%56+4, 3, 2);
                  break;
                }
                case TILES.ROCK:
                  ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
                  ctx.fillStyle = COLORS.rock; ctx.beginPath(); ctx.ellipse(16, 20, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
                  ctx.restore();
                  break;
                case TILES.BUSH:
                  ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
                  ctx.fillStyle = COLORS.bush; ctx.beginPath(); ctx.arc(16, 20, 10, 0, Math.PI * 2); ctx.fill();
                  ctx.restore();
                  break;
                case TILES.GOLDEN_GATE:
                  // Path ground under the gate (drawn in pass 1)
                  ctx.fillStyle = '#9b7d52'; ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                  tallObjects.push({ tile, screenX, screenY, mapY });
                  break;
                case TILES.TREE:
                case TILES.TREE_OF_LIFE:
                case TILES.TREE_OF_KNOWLEDGE:
                  // Defer to pass 2 so they draw on top of all ground
                  tallObjects.push({ tile, screenX, screenY, mapX, mapY });
                  break;
              }
            }
          }
        }

        // ── PASS 2: Y-sorted draw of tall objects, NPCs, and player ──────
        // Collect all entities that need Y-sorting
        const sortedEntities = [];
        tallObjects.forEach(obj => sortedEntities.push({ type: 'tall', ...obj }));
        npcs.forEach(npc => {
          const sx = (npc.x - camera.x) * TILE_SIZE, sy = (npc.y - camera.y) * TILE_SIZE;
          if (sx > -TILE_SIZE * 2 && sx < canvas.width + TILE_SIZE * 2 && sy > -TILE_SIZE * 2 && sy < canvas.height + TILE_SIZE * 2) {
            sortedEntities.push({ type: 'npc', npc, screenX: sx, screenY: sy, mapY: npc.y });
          }
        });
        if (gamePhase !== PHASES.CUTSCENE && gamePhase !== PHASES.CHAPTER3_CUTSCENE && gamePhase !== PHASES.COMPLETE) {
          sortedEntities.push({ type: 'player', screenX: (player.x - camera.x) * TILE_SIZE, screenY: (player.y - camera.y) * TILE_SIZE, mapY: player.y });
        }
        // Sort by mapY so entities further down screen draw on top
        sortedEntities.sort((a, b) => a.mapY - b.mapY);

        // Helper to draw a tall object
        const drawTallObject = ({ tile, screenX, screenY, mapX }) => {
          switch (tile) {
            case TILES.TREE:
              ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
              // draw trunk + canopy base so the tile looks solid, then overlay emoji
              ctx.fillStyle = COLORS.treeTrunk; ctx.fillRect(12, 16, 8, 16);
              ctx.fillStyle = COLORS.tree;
              ctx.beginPath(); ctx.arc(16, 12, 14, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = 'rgba(255,255,255,0.10)';
              ctx.beginPath(); ctx.arc(13, 8, 7, 0, Math.PI * 2); ctx.fill();
              // emoji overlay for visual appeal
              ctx.font = '20px serif';
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText('🌳', 16, 12);
              ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
              ctx.restore();
              break;
            case TILES.TREE_OF_LIFE:
              ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
              ctx.fillStyle = '#654321'; ctx.fillRect(8, 10, 16, 22);
              ctx.fillStyle = COLORS.treeOfLife; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20 + Math.sin(gameTime * 0.1) * 8;
              ctx.beginPath(); ctx.arc(16, 4, 22, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
              ctx.fillStyle = '#ffd700'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
              ctx.fillText('ETS CHAYIM', 16, 30); ctx.textAlign = 'left';
              ctx.restore();
              break;
            case TILES.TREE_OF_KNOWLEDGE:
              ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
              ctx.fillStyle = '#4a3520'; ctx.fillRect(8, 10, 16, 22);
              ctx.fillStyle = '#1a3a1a'; ctx.beginPath(); ctx.arc(16, 4, 22, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = '#cc0000';
              [[8,2],[24,0],[16,8],[6,10],[26,8]].forEach(([fx,fy]) => { ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI * 2); ctx.fill(); });
              ctx.fillStyle = '#ff6666'; ctx.font = 'bold 6px monospace'; ctx.textAlign = 'center';
              ctx.fillText("ETS HADA'AT", 16, 30);
              ctx.fillText("TOV V'RA", 16, 37); ctx.textAlign = 'left';
              ctx.restore();
              break;
            case TILES.GOLDEN_GATE: {
              ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
              const glowPulse = 0.5 + 0.5 * Math.sin(gameTime * 0.07);
              ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18 + glowPulse * 12;
              const pillarGrad = ctx.createLinearGradient(4, 0, 10, 0);
              pillarGrad.addColorStop(0, '#8b6914'); pillarGrad.addColorStop(0.3, '#ffd700'); pillarGrad.addColorStop(0.7, '#ffec6e'); pillarGrad.addColorStop(1, '#b8860b');
              ctx.fillStyle = pillarGrad; ctx.fillRect(4, -26, 6, 58);
              const pillarGrad2 = ctx.createLinearGradient(22, 0, 28, 0);
              pillarGrad2.addColorStop(0, '#b8860b'); pillarGrad2.addColorStop(0.3, '#ffec6e'); pillarGrad2.addColorStop(0.7, '#ffd700'); pillarGrad2.addColorStop(1, '#8b6914');
              ctx.fillStyle = pillarGrad2; ctx.fillRect(22, -26, 6, 58);
              ctx.fillStyle = '#ffd700';
              ctx.fillRect(2, -29, 10, 4); ctx.fillRect(20, -29, 10, 4);
              ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
              ctx.beginPath(); ctx.arc(16, -26, 12, Math.PI, 0); ctx.stroke();
              ctx.lineWidth = 2; ctx.strokeStyle = '#fff8dc';
              ctx.beginPath(); ctx.arc(16, -26, 10, Math.PI, 0); ctx.stroke();
              ctx.strokeStyle = '#daa520'; ctx.lineWidth = 1.5;
              for (let bx = 11; bx <= 21; bx += 2) {
                ctx.beginPath(); ctx.moveTo(bx, -22); ctx.lineTo(bx, 28); ctx.stroke();
              }
              ctx.fillStyle = '#ffd700'; ctx.fillRect(10, -6, 12, 2);
              ctx.shadowBlur = 0; ctx.fillStyle = '#fff8a0';
              ctx.beginPath(); ctx.arc(16, -26, 3, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = '#ffd700';
              [[0,-4],[4,3],[-4,3],[2,-3],[-2,-3]].forEach(([ox,oy]) => {
                ctx.beginPath(); ctx.arc(16+ox, -26+oy, 1, 0, Math.PI*2); ctx.fill();
              });
              ctx.shadowBlur = 0;
              ctx.restore();
              break;
            }
          }
        };

        // Helper to draw an NPC
        const drawNpc = (npc, screenX, screenY) => {
            // All sprite drawing scaled 2× inside this block
            ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
            if (npc.isSerpent) {
              // Upright walking lizard (Nachash before the curse)
              const frame = Math.floor(npc.walkFrame) % 4;
              const bob = npc.isMoving && frame % 2 === 1 ? 1 : 0;
              const armSwg = npc.isMoving ? (frame < 2 ? 2 : -2) : 0;
              const legSwg = npc.isMoving ? (frame < 2 ? 2 : -2) : 0;
              const DK = '#0a3a0a';
              const BODY = '#228b22';
              const BELLY = '#90ee90';
              const r = (dx, dy, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(16 + dx, bob + dy, w, h); };

              // Tail (behind body, curving down)
              ctx.fillStyle = BODY;
              ctx.beginPath();
              ctx.moveTo(14, bob + 18);
              ctx.quadraticCurveTo(6, bob + 24, 4, bob + 30);
              ctx.lineTo(7, bob + 30);
              ctx.quadraticCurveTo(9, bob + 24, 16, bob + 20);
              ctx.fill();

              // Legs with feet (walking animation)
              r(-5, 20, 4, 6 + legSwg, BODY);   // left leg
              r(-6, 26 + legSwg, 6, 2, DK);      // left foot (3 toes)
              r(-7, 25 + legSwg, 2, 2, DK);      // left toe
              r( 1, 20, 4, 6 - legSwg, BODY);    // right leg
              r( 0, 26 - legSwg, 6, 2, DK);      // right foot
              r( 5, 25 - legSwg, 2, 2, DK);      // right toe

              // Body (torso)
              r(-6, 11, 12, 10, DK);             // outline
              r(-5, 12, 10, 8, BODY);            // body fill
              r(-3, 13, 6, 6, BELLY);            // lighter belly

              // Arms with claws
              r(-8, 12 + armSwg, 3, 7, DK);      // left arm outline
              r(-8, 13 + armSwg, 2, 5, BODY);    // left arm
              r(-9, 18 + armSwg, 2, 2, DK);      // left claw
              r( 5, 12 - armSwg, 3, 7, DK);      // right arm outline
              r( 5, 13 - armSwg, 2, 5, BODY);    // right arm
              r( 6, 18 - armSwg, 2, 2, DK);      // right claw

              // Head (lizard-shaped, slightly elongated)
              r(-7, 0, 14, 12, DK);              // outline
              r(-6, 1, 12, 10, BODY);            // head fill
              // Snout (protruding forward)
              r(-8, 4, 3, 5, DK);
              r(-7, 5, 2, 3, BODY);
              // Eyes (slit pupils, yellow-red)
              ctx.fillStyle = '#ffcc00'; ctx.fillRect(16 - 4, bob + 3, 3, 3);  // left eye
              ctx.fillStyle = '#ffcc00'; ctx.fillRect(16 + 1, bob + 3, 3, 3);  // right eye
              ctx.fillStyle = '#cc0000'; ctx.fillRect(16 - 3, bob + 4, 1, 2);  // left slit
              ctx.fillStyle = '#cc0000'; ctx.fillRect(16 + 2, bob + 4, 1, 2);  // right slit
              // Mouth line
              ctx.fillStyle = DK; ctx.fillRect(16 - 7, bob + 8, 6, 1);
              // Forked tongue (flickers)
              if (Math.sin(gameTime * 0.3) > 0.3) {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(16 - 10, bob + 7, 3, 1);
                ctx.fillRect(16 - 12, bob + 6, 2, 1);
                ctx.fillRect(16 - 12, bob + 8, 2, 1);
              }
              // Ridge/spines along the back
              ctx.fillStyle = '#1a6b1a';
              for (let i = 0; i < 4; i++) {
                ctx.fillRect(16 + 4, bob + 2 + i * 4, 3, 2);
              }
            } else if (npc.isAngel) {
              const dir = npc.direction || 'down';
              const wf = Math.sin(gameTime * 0.12) * 0.08;
              const wingColor = '#fff8dc';
              const wingEdge = '#e8e0c0';

              // Draw wings BEFORE body for front/side, AFTER for back
              const drawWings = () => {
                ctx.save();
                ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 8;
                ctx.fillStyle = wingColor;

                if (dir === 'left' || dir === 'right') {
                  // Side view: both wings stacked together behind body, visible as one pair
                  const wx = dir === 'right' ? 4 : 28;
                  // Back wing (slightly offset)
                  ctx.fillStyle = wingEdge;
                  ctx.beginPath(); ctx.ellipse(wx, 10, 5, 13, wf, 0, Math.PI * 2); ctx.fill();
                  // Front wing
                  ctx.fillStyle = wingColor;
                  ctx.beginPath(); ctx.ellipse(wx + (dir === 'right' ? 1 : -1), 10, 5, 12, -wf, 0, Math.PI * 2); ctx.fill();
                } else if (dir === 'up') {
                  // Back view: wings on the character's back, spread outward
                  // Left wing - attached to back, extending left
                  ctx.fillStyle = wingColor;
                  ctx.beginPath();
                  ctx.moveTo(12, 8);
                  ctx.quadraticCurveTo(-4 - wf * 30, 4, -2, 20);
                  ctx.quadraticCurveTo(4, 16, 12, 14);
                  ctx.closePath(); ctx.fill();
                  ctx.strokeStyle = wingEdge; ctx.lineWidth = 1; ctx.stroke();
                  // Right wing - attached to back, extending right
                  ctx.beginPath();
                  ctx.moveTo(20, 8);
                  ctx.quadraticCurveTo(36 + wf * 30, 4, 34, 20);
                  ctx.quadraticCurveTo(28, 16, 20, 14);
                  ctx.closePath(); ctx.fill();
                  ctx.strokeStyle = wingEdge; ctx.lineWidth = 1; ctx.stroke();
                } else {
                  // Front view (down): wings behind body, spread outward
                  // Left wing
                  ctx.beginPath(); ctx.ellipse(2, 12, 7, 12, -0.5 - wf, 0, Math.PI * 2); ctx.fill();
                  // Right wing
                  ctx.beginPath(); ctx.ellipse(30, 12, 7, 12, 0.5 + wf, 0, Math.PI * 2); ctx.fill();
                }

                ctx.shadowBlur = 0;
                ctx.restore();
              };

              // Back view: draw body first, then wings on top
              if (dir === 'up') {
                drawCharacterSprite(ctx, 0, 0, {
                  walkFrame: npc.walkFrame, isMoving: npc.isMoving, direction: dir,
                  hairColor: '#1a1a1a', bodyColor: '#ffffff', skinColor: SKIN_COLOR,
                  isEve: false, showClothes: false, gameTime,
                });
                drawWings();
              } else {
                // Front/side: draw wings behind, then body over them
                drawWings();
                drawCharacterSprite(ctx, 0, 0, {
                  walkFrame: npc.walkFrame, isMoving: npc.isMoving, direction: dir,
                  hairColor: '#1a1a1a', bodyColor: '#ffffff', skinColor: SKIN_COLOR,
                  isEve: false, showClothes: false, gameTime,
                });
              }
              // Halo
              ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.ellipse(16, -3, 8, 3, 0, 0, Math.PI * 2); ctx.stroke();
            } else {
              const showClothes = npc.hasClothes || (npc.clothesBlink > 0 && Math.floor(npc.clothesBlink * 3) % 2 === 0);
              drawCharacterSprite(ctx, 0, 0, {
                walkFrame: npc.walkFrame, isMoving: npc.isMoving, direction: npc.direction || 'down',
                hairColor: npc.hairColor, bodyColor: npc.isEve ? '#c07080' : '#6b8c42', skinColor: SKIN_COLOR,
                isEve: npc.isEve, showClothes,
                holdingFruit: npc.holdingFruit, isEating: npc.isEating,
                hasGlory: npc.hasGlory, gameTime,
              });
            }
            ctx.restore();
            // Name tag and speech bubble drawn at screen coords (outside scale block)
            const cx = screenX + TILE_SIZE / 2;
            if (!showDialogue && gamePhase === PHASES.EXPLORE) drawSpeechBubble(ctx, cx, screenY, npc.thoughts[npc.currentThought], npc.isSerpent);
            const nameText = npc.hasSpoken ? `✓ ${npc.name}` : npc.name;
            ctx.font = 'bold 14px sans-serif';
            const nameWidth = ctx.measureText(nameText).width + 12;
            const nameBoxH = 20, nameBoxY = screenY + 68;
            ctx.fillStyle = npc.hasSpoken ? 'rgba(0,100,0,0.85)' : 'rgba(0,0,0,0.75)';
            ctx.beginPath();
            ctx.roundRect(cx - nameWidth / 2, nameBoxY, nameWidth, nameBoxH, 5);
            ctx.fill();
            ctx.fillStyle = npc.isSerpent ? '#aaffaa' : '#fff';
            ctx.fillText(nameText, cx - nameWidth / 2 + 6, nameBoxY + 14);
        };

        // Helper to draw the player
        const drawPlayer = (screenX, screenY) => {
          ctx.save(); ctx.translate(screenX, screenY); ctx.scale(SCALE, SCALE);
          drawCharacterSprite(ctx, 0, 0, {
            walkFrame: player.walkFrame, isMoving: player.isMoving, direction: player.direction,
            hairColor: '#1a1a1a', bodyColor: '#4169e1', skinColor: SKIN_COLOR,
            gameTime,
          });
          ctx.restore();
        };

        // Draw all entities in Y-sorted order
        sortedEntities.forEach(ent => {
          if (ent.type === 'tall') drawTallObject(ent);
          else if (ent.type === 'npc') drawNpc(ent.npc, ent.screenX, ent.screenY);
          else if (ent.type === 'player') drawPlayer(ent.screenX, ent.screenY);
        });

        if (gamePhase === PHASES.EXPLORE) {
          // ── Off-screen NPC direction arrows ────────────────────────
          const margin = 40;
          npcs.forEach(npc => {
            if (npc.id === 'malak') return; // don't point to the angel
            if (npc.hasSpoken) return;       // already spoken to
            const sx = (npc.x - camera.x) * TILE_SIZE;
            const sy = (npc.y - camera.y) * TILE_SIZE;
            const onScreen = sx > -TILE_SIZE && sx < W + TILE_SIZE && sy > -TILE_SIZE && sy < H + TILE_SIZE;
            if (onScreen) return;
            // Clamp to screen edge
            const ax = Math.max(margin, Math.min(W - margin, sx));
            const ay = Math.max(margin + 30, Math.min(H - margin - 90, sy));
            const angle = Math.atan2(sy - H / 2, sx - W / 2);
            const arrowColor = npc.isSerpent ? '#5aff5a' : '#facc15';
            ctx.save();
            ctx.translate(ax, ay);
            ctx.rotate(angle);
            ctx.fillStyle = arrowColor;
            ctx.globalAlpha = 0.6 + 0.2 * Math.sin(gameTime * 0.15);
            ctx.beginPath();
            ctx.moveTo(14, 0);
            ctx.lineTo(-6, -8);
            ctx.lineTo(-6, 8);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
            // Label
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = arrowColor;
            ctx.globalAlpha = 0.8;
            ctx.fillText(npc.name, ax - ctx.measureText(npc.name).width / 2, ay + 18);
            ctx.globalAlpha = 1;
          });
        }

      }, [map, player, npcs, camera, showDialogue, gameTime, gamePhase, cutsceneSlide, chapter3Slide]);

      const spokenCount = npcs.filter(n => ['adam', 'chavvah', 'nachash'].includes(n.id) && n.hasSpoken).length;

      return (
        <div className="game-container">
          {gamePhase !== PHASES.CUTSCENE && gamePhase !== PHASES.CHAPTER3_CUTSCENE && <h1 className="title">BERE'SHIYTH: In The Beginning</h1>}
          <canvas ref={canvasRef} />

          {gamePhase === PHASES.CUTSCENE && (() => {
            const slide = CUTSCENE_SLIDES[cutsceneSlide];
            return (
              <div className="cutscene-overlay">
                <div className="cutscene-header">
                  {slide.day && <p className="cutscene-day">{slide.day}</p>}
                </div>
                <span className="cutscene-counter">{cutsceneSlide + 1} / {CUTSCENE_SLIDES.length}</span>
                <div className="cutscene-box">
                  <p className="cutscene-ref">{slide.ref}</p>
                  {slide.lines.map((line, i) => <p key={i} className="cutscene-verse">{line}</p>)}
                  <button className="cutscene-btn" onClick={advanceCutscene}>
                    {cutsceneSlide < CUTSCENE_SLIDES.length - 1 ? 'Continue \u25B6' : 'Enter the Garden \u25B6'}
                  </button>
                </div>
              </div>
            );
          })()}

          {gamePhase === PHASES.CHAPTER3_CUTSCENE && (() => {
            const slide = CHAPTER3_SLIDES[chapter3Slide];
            return (
              <div className="cutscene-overlay">
                <div className="cutscene-header">
                  <p className="cutscene-day">The Fall of Man</p>
                </div>
                <span className="cutscene-counter">{chapter3Slide + 1} / {CHAPTER3_SLIDES.length}</span>
                <div className="cutscene-box">
                  <p className="cutscene-ref">{slide.ref}</p>
                  {slide.lines.map((line, i) => <p key={i} className="cutscene-verse">{line}</p>)}
                  <button className="cutscene-btn" onClick={advanceChapter3}>
                    {chapter3Slide < CHAPTER3_SLIDES.length - 1 ? 'Continue \u25B6' : 'Finish \u25B6'}
                  </button>
                </div>
              </div>
            );
          })()}

          {gamePhase === PHASES.SERPENT_DIALOGUE && (() => {
            const line = SERPENT_DIALOGUE_LINES[serpentDialogueIndex];
            return (
              <div className="dialogue-box scene-dialogue">
                <div className="dialogue-header">
                  <span className="dialogue-name" style={{color: line.speaker === 'nachash' ? '#5a9c5a' : '#facc15'}}>{line.name}</span>
                  <span className="dialogue-counter">{serpentDialogueIndex + 1}/{SERPENT_DIALOGUE_LINES.length}</span>
                </div>
                <p className="dialogue-text">{line.text}</p>
                <button className="btn" onClick={advanceSerpentDialogue}>
                  {serpentDialogueIndex < SERPENT_DIALOGUE_LINES.length - 1 ? 'Next \u25B6' : 'Continue \u25B6'}
                </button>
              </div>
            );
          })()}

          {showDialogue && (
            <div className="dialogue-box">
              <div className="dialogue-header">
                <span className="dialogue-name">{showDialogue.name}</span>
                <span className="dialogue-counter">{showDialogue.currentDialogue + 1}/{npcs.find(n => n.id === showDialogue.id)?.dialogue.length}</span>
              </div>
              <p className="dialogue-text">{npcs.find(n => n.id === showDialogue.id)?.dialogue[showDialogue.currentDialogue]}</p>
              <button className="btn" onClick={advanceDialogue}>
                {showDialogue.currentDialogue < (npcs.find(n => n.id === showDialogue.id)?.dialogue.length || 1) - 1 ? 'Next ▶' : 'Close ✓'}
              </button>
            </div>
          )}

          {showSceneText && !showDialogue && (
            <div className={`dialogue-box${gamePhase !== PHASES.EXPLORE ? ' scene-dialogue' : ''}`}>
              <p className="scene-text">{sceneText}</p>
              <button className="btn" onClick={() => { if (gamePhase !== PHASES.EXPLORE) advanceScene(); else setShowSceneText(false); }}>
                {gamePhase === PHASES.EXPLORE ? 'Begin ▶' : 'Continue ▶'}
              </button>
            </div>
          )}

          {gamePhase === PHASES.EXPLORE && !showDialogue && !showSceneText && (
            <p className="quest-text">Speak to A'dam, Chavvah, and the Nachash ({spokenCount}/3)</p>
          )}

          {gamePhase === PHASES.EXPLORE && !showDialogue && !showSceneText && (
            <div className="controls">
              <div className="dpad">
                <div></div>
                <button className="dpad-btn" onTouchStart={(e) => { e.preventDefault(); handleTouchStart('up'); }} onTouchEnd={(e) => { e.preventDefault(); handleTouchEnd(); }} onMouseDown={() => handleTouchStart('up')} onMouseUp={handleTouchEnd} onMouseLeave={handleTouchEnd}>▲</button>
                <div></div>
                <button className="dpad-btn" onTouchStart={(e) => { e.preventDefault(); handleTouchStart('left'); }} onTouchEnd={(e) => { e.preventDefault(); handleTouchEnd(); }} onMouseDown={() => handleTouchStart('left')} onMouseUp={handleTouchEnd} onMouseLeave={handleTouchEnd}>◀</button>
                <div></div>
                <button className="dpad-btn" onTouchStart={(e) => { e.preventDefault(); handleTouchStart('right'); }} onTouchEnd={(e) => { e.preventDefault(); handleTouchEnd(); }} onMouseDown={() => handleTouchStart('right')} onMouseUp={handleTouchEnd} onMouseLeave={handleTouchEnd}>▶</button>
                <div></div>
                <button className="dpad-btn" onTouchStart={(e) => { e.preventDefault(); handleTouchStart('down'); }} onTouchEnd={(e) => { e.preventDefault(); handleTouchEnd(); }} onMouseDown={() => handleTouchStart('down')} onMouseUp={handleTouchEnd} onMouseLeave={handleTouchEnd}>▼</button>
                <div></div>
              </div>
              <button className="talk-btn" onClick={handleInteraction}>TALK</button>
            </div>
          )}

          {gamePhase !== PHASES.EXPLORE && gamePhase !== PHASES.CUTSCENE && gamePhase !== PHASES.CHAPTER3_CUTSCENE && (
            <p className="phase-indicator">{gamePhase === PHASES.COMPLETE ? '\uD83D\uDCD6 The Fall of Man' : '\uD83D\uDCD6 Scene in Progress...'}</p>
          )}

          <p className="help-text">WASD/Arrows to move • SPACE to interact</p>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<GenesisGame />);
  </script>
</body>
</html>
